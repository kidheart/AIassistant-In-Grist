</head><body>
<div class="head">
  <span>${escapeHtml(lastDashSpec.title || "Dashboard")}</span>
  <span style="float:right;font-size:11px;color:#888;font-weight:400">Generated: ${new Date().toLocaleString("en-GB",{hour12:false})}</span>
</div>
<div class="grid" id="grid"></div>

<script>
const PALETTE = ${JSON.stringify(PALETTE)};
const D = ${payload};
const grid = document.getElementById("grid");

function parseDt(v){if(v==null||v==="")return null;if(v instanceof Date)return isNaN(v)?null:v;if(typeof v==="number"){const ms=v<4e9?v*1000:v;const d=new Date(ms);return isNaN(d)?null:d;}if(typeof v==="string"){const d=new Date(v);if(!isNaN(d))return d;const m=v.match(/^(\\d{1,2})[\\/\\-](\\d{1,2})[\\/\\-](\\d{2,4})$/);if(m){const yr=m[3].length===2?"20"+m[3]:m[3];const d2=new Date(yr+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0"));return isNaN(d2)?null:d2;}return null;}return null;}
function sMin(a){if(!a||!a.length)return Infinity;let m=a[0];for(let i=1;i<a.length;i++)if(a[i]<m)m=a[i];return m;}
function sMax(a){if(!a||!a.length)return -Infinity;let m=a[0];for(let i=1;i<a.length;i++)if(a[i]>m)m=a[i];return m;}
function bktDt(d,b){const y=d.getFullYear(),m=d.getMonth();switch((b||"month").toLowerCase()){case"year":return String(y);case"quarter":return y+"-Q"+(Math.floor(m/3)+1);case"month":return y+"-"+String(m+1).padStart(2,"0");case"day":default:return d.toISOString().slice(0,10);}}
function evF(f,i,data){const c=data[f.col];if(!c)return true;const v=c[i];const op=(f.op||"=").toLowerCase();switch(op){case"=":case"==":return String(v)===String(f.value);case"!=":case"<>":return String(v)!==String(f.value);case"<":return +v<+f.value;case"<=":return +v<=+f.value;case">":return +v>+f.value;case">=":return +v>=+f.value;case"in":return Array.isArray(f.value)&&f.value.map(String).includes(String(v));case"contains":return String(v??"").toLowerCase().includes(String(f.value).toLowerCase());case"is_empty":return v==null||v==="";case"not_empty":return v!=null&&v!=="";case"before":{const a=parseDt(v),b=parseDt(f.value);return a&&b&&a<b;}case"after":{const a=parseDt(v),b=parseDt(f.value);return a&&b&&a>b;}case"between":{if(!Array.isArray(f.value))return true;const d=parseDt(v),lo=parseDt(f.value[0]),hi=parseDt(f.value[1]);return d&&lo&&hi&&d>=lo&&d<=hi;}default:return true;}}
function fIdx(filters,data){const t=Object.values(data)[0]?.length??0;if(!filters||!filters.length)return Array.from({length:t},(_,i)=>i);const o=[];for(let i=0;i<t;i++)if(filters.every(f=>evF(f,i,data)))o.push(i);return o;}
function aggregate(data, xCol, yCol, agg, indices, dateBucket) {
  const xv = data[xCol]; const yv = yCol?data[yCol]:null;
  if(!xv) return {labels:[],values:[]};
  const idx = indices || xv.map((_,i)=>i);
  const g={};
  for(const i of idx){let key;if(dateBucket){const d=parseDt(xv[i]);if(!d)continue;key=bktDt(d,dateBucket);}else key=String(xv[i]??"(empty)");const y=yv?+yv[i]:1;if(!g[key])g[key]=[];g[key].push(isNaN(y)?(yv?0:1):y);}
  const e=Object.entries(g).map(([k,a])=>{let v;switch(agg){case"sum":v=a.reduce((s,b)=>s+b,0);break;case"avg":v=a.reduce((s,b)=>s+b,0)/a.length;break;case"max":v=sMax(a);break;case"min":v=sMin(a);break;default:v=a.length;}return{x:k,y:+v.toFixed(4)};});
  if(dateBucket)e.sort((a,b)=>a.x.localeCompare(b.x));else e.sort((a,b)=>b.y-a.y);
  return {labels:e.map(o=>o.x),values:e.map(o=>o.y)};
}
function haversine(la1,lo1,la2,lo2){const R=6371000,r=x=>x*Math.PI/180,dl=r(la2-la1),dn=r(lo2-lo1);const a=Math.sin(dl/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dn/2)**2;return R*2*Math.asin(Math.sqrt(a));}
function fmtDist(m){return m>=1000?(m/1000).toFixed(2)+" km":Math.round(m)+" m";}

const DARK={paper_bgcolor:"#13131f",plot_bgcolor:"#1a1a2e",font:{color:"#c0c0d0",size:11},margin:{t:10,b:50,l:42,r:14},xaxis:{gridcolor:"#1e2040",linecolor:"#252550",tickfont:{size:9},tickangle:-30},yaxis:{gridcolor:"#1e2040",linecolor:"#252550",tickfont:{size:9}},colorway:PALETTE};

D.panels.forEach((p,i) => {
  const isMap = p.type==="map" || p.type==="shift_map";
  const isStat = p.type==="stat";
  const panel = document.createElement("div");
  panel.className = "panel" + (isMap?" full":"") + (isStat?" stat":"");
  panel.innerHTML = '<div class="phead">'+(p.title||p.type)+'</div><div class="pbody"><div id="b'+i+'"></div></div>';
  grid.appendChild(panel);
  const id = "b"+i;
  setTimeout(() => render(p, id), 0);
});

function computeStat(s){const t=Object.values(D.data)[0]?.length??0;let idx;if(s.filters&&s.filters.length){idx=fIdx(s.filters,D.data);}else if(s.filter_col&&D.data[s.filter_col]&&s.filter_value!=null&&s.filter_value!==""){const fc=D.data[s.filter_col];idx=[];for(let i=0;i<fc.length;i++)if(String(fc[i])===String(s.filter_value))idx.push(i);}else idx=Array.from({length:t},(_,i)=>i);if(!s.col)return idx.length;const c=D.data[s.col];if(!c)return null;if(s.agg==="count")return idx.filter(i=>c[i]!=null&&c[i]!=="").length;const n=idx.map(i=>+c[i]).filter(x=>!isNaN(x));if(!n.length)return 0;switch(s.agg){case"sum":return n.reduce((a,b)=>a+b,0);case"avg":return n.reduce((a,b)=>a+b,0)/n.length;case"max":return sMax(n);case"min":return sMin(n);default:return n.length;}}
function fmtStat(v,f){if(v==null)return"—";if(typeof v!=="number"||isNaN(v))return String(v);switch(f){case"percent":return v.toFixed(1)+"%";case"currency":return"RM "+Math.round(v).toLocaleString();case"metres":return v>=1000?(v/1000).toFixed(2)+" km":Math.round(v).toLocaleString()+" m";case"kilometres":return v.toFixed(2)+" km";case"decimal":return v.toFixed(2);default:if(Number.isInteger(v))return v.toLocaleString();if(Math.abs(v)>=1000)return Math.round(v).toLocaleString();return v.toFixed(2);}}
function escTxt(s){return String(s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}

function render(p, id) {
  const idx = fIdx(p.filters, D.data);
  if(p.type==="stat"){const t=document.getElementById(id);t.parentElement.classList.add("statbody");t.innerHTML='<div class="statval">'+escTxt(fmtStat(computeStat(p),p.format))+'</div>'+(p.sub?'<div class="statsub">'+escTxt(p.sub)+'</div>':'');}
  else if(p.type==="audit"){renderAudit(p, id);}
  else if(p.type==="bar"){const{labels,values}=aggregate(D.data,p.x_col,p.y_col||null,p.agg||"count",idx,p.date_bucket);const isH=p.orientation==="h"||p.orientation==="horizontal";if(isH){labels.reverse();values.reverse();}const tr=isH?{type:"bar",y:labels,x:values,orientation:"h",marker:{color:PALETTE[0]}}:{type:"bar",x:labels,y:values,marker:{color:PALETTE[0]}};Plotly.react(id,[tr],{...DARK,margin:isH?{t:10,b:40,l:120,r:14}:DARK.margin,yaxis:isH?{...DARK.yaxis,automargin:true}:DARK.yaxis},{responsive:true,displayModeBar:false});}
  else if(p.type==="ratio_bar"){const{labels,values}=aggregate(D.data,p.names_col,null,"count",idx);const total=values.reduce((a,b)=>a+b,0);const traces=labels.map((l,j)=>{const c=values[j],pc=(c/total*100).toFixed(1);return{type:"bar",orientation:"h",y:[p.title||""],x:[c],name:l+": "+c+" ("+pc+"%)",marker:{color:PALETTE[j%PALETTE.length]},text:l+"<br>"+c+" ("+pc+"%)",textposition:"inside",insidetextanchor:"middle",textfont:{color:"#fff",size:11},hovertemplate:l+": %{x} ("+pc+"%)<extra></extra>"};});Plotly.react(id,traces,{...DARK,barmode:"stack",showlegend:true,legend:{orientation:"h",x:0,y:-0.6,font:{size:10,color:"#c0c0d0"}},margin:{t:8,b:60,l:14,r:14},xaxis:{showgrid:false,zeroline:false,showticklabels:false},yaxis:{showgrid:false,zeroline:false,automargin:true,tickfont:{color:"#aaa",size:10}}},{responsive:true,displayModeBar:false});}
  else if(p.type==="line"){const{labels,values}=aggregate(D.data,p.x_col,p.y_col||null,p.agg||"sum",idx,p.date_bucket);Plotly.react(id,[{type:"scatter",mode:"lines+markers",x:labels,y:values,line:{color:PALETTE[0]}}],DARK,{responsive:true,displayModeBar:false});}
  else if(p.type==="area"){const{labels,values}=aggregate(D.data,p.x_col,p.y_col||null,p.agg||"sum",idx,p.date_bucket);Plotly.react(id,[{type:"scatter",mode:"lines",fill:"tozeroy",x:labels,y:values,line:{color:PALETTE[0]}}],DARK,{responsive:true,displayModeBar:false});}
  else if(p.type==="pie"){const{labels,values}=aggregate(D.data,p.names_col,p.values_col||null,p.agg||"count",idx);Plotly.react(id,[{type:"pie",labels,values,hole:0.4,marker:{colors:PALETTE}}],{...DARK,margin:{t:10,b:10,l:10,r:10}},{responsive:true,displayModeBar:false});}
  else if(p.type==="scatter"){const xv=(D.data[p.x_col]||[]).map(Number),yv=(D.data[p.y_col]||[]).map(Number);Plotly.react(id,[{type:"scatter",mode:"markers",x:idx.map(i=>xv[i]),y:idx.map(i=>yv[i]),marker:{color:PALETTE[0],size:4,opacity:0.7}}],DARK,{responsive:true,displayModeBar:false});}
  else if(p.type==="histogram"){const vals=(D.data[p.x_col]||[]).map(Number).filter(n=>!isNaN(n));Plotly.react(id,[{type:"histogram",x:vals,nbinsx:p.nbins||20,marker:{color:PALETTE[0],opacity:0.8}}],{...DARK,xaxis:{...DARK.xaxis,title:{text:p.x_col}},title:{text:p.title||"Histogram"}},{responsive:true,displayModeBar:false});}
  else if(p.type==="box"){const xv=D.data[p.x_col],yv=(D.data[p.y_col]||[]).map(Number);const groups={};idx.forEach(i=>{const cat=String(xv[i]??"(empty)");if(!groups[cat])groups[cat]=[];const n=yv[i];if(!isNaN(n))groups[cat].push(n);});Plotly.react(id,Object.entries(groups).map(([cat,arr],j)=>({type:"box",y:arr,name:cat,marker:{color:PALETTE[j%PALETTE.length]}})),{...DARK,yaxis:{...DARK.yaxis,title:{text:p.y_col}},title:{text:p.title||""}},{responsive:true,displayModeBar:false});}
  else if(p.type==="table"){const target=document.getElementById(id);const cols=(p.columns&&p.columns.length?p.columns:Object.keys(D.data).slice(0,8)).filter(c=>D.data[c]);const rows=idx.slice(0,50).map(i=>{const r={};cols.forEach(c=>r[c]=D.data[c]?.[i]);return r;});let html='<div style="height:100%;overflow:auto;padding:8px"><table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr>'+cols.map(c=>'<th style="position:sticky;top:0;background:#0f3460;color:#dbeafe;text-align:left;padding:4px;border-bottom:1px solid #1e4d80">'+escTxt(c)+'</th>').join("")+'</tr></thead><tbody>'+rows.map((r,ri)=>'<tr style="background:'+(ri%2?"#151526":"#1a1a2e")+'">'+cols.map(c=>{let v=r[c];if(v==null||v==="")v="—";v=String(v);if(v.length>60)v=v.slice(0,60)+"...";return'<td style="padding:4px;border-bottom:1px solid #252545;color:#c0c0d0;vertical-align:top">'+escTxt(v)+'</td>'}).join("")+'</tr>').join("")+'</tbody></table></div>';target.innerHTML=html;}
  else if(p.type==="map") renderMap(p, id, idx);
  else if(p.type==="shift_map") renderShiftMap(p, id, idx);
  else if(p.type==="heatmap") renderHeatmapExport(p, id, idx);
}

function renderAudit(p, id) {
  const t = document.getElementById(id);
  t.style.cssText = "overflow-y:auto;padding:10px;background:#13131f;color:#e0e0e0;font-family:sans-serif;";
  const total = Object.values(D.data)[0]?.length ?? 0;
  const checks = [];
  checks.push({ic:"📊",lab:"Total rows",det:total.toLocaleString(),col:"#90d0e8"});
  let anyMissing = false;
  for (const [c, v] of Object.entries(D.data)) {
    const m = v.filter(x => x==null||x==="").length;
    if (m > 0) {
      anyMissing = true;
      const pct = (m/total*100).toFixed(1);
      checks.push({ic:pct>10?"⚠️":"•",lab:c,det:m+" missing ("+pct+"%)",col:pct>10?"#ffd166":"#06d6a0"});
    }
  }
  if (!anyMissing) checks.push({ic:"✅",lab:"Missing values",det:"None",col:"#06d6a0"});
  checks.forEach(x => {
    const r = document.createElement("div");
    r.style.cssText = "display:flex;align-items:center;gap:9px;padding:6px 4px;border-bottom:1px solid #1e1e35;font-size:11px;";
    r.innerHTML = '<span style="font-size:13px;width:18px;text-align:center">'+x.ic+'</span><span style="flex:1;color:'+x.col+';font-weight:500">'+escTxt(x.lab)+'</span><span style="color:#888">'+escTxt(x.det)+'</span>';
    t.appendChild(r);
  });
}

function renderMap(p, id, idx) {
  const latv=(D.data[p.lat_col]||[]).map(Number),lonv=(D.data[p.lon_col]||[]).map(Number);
  const fixedR = (typeof p.radius==="number"&&p.radius>0)?(p.radius<=5?Math.round(p.radius*1000):Math.round(p.radius)):null;
  const radCol = (!fixedR && p.radius_col && D.data[p.radius_col])?D.data[p.radius_col].map(Number):null;
  const colv = p.color_col && D.data[p.color_col]?D.data[p.color_col]:null;
  const pts = [];
  for(const i of (idx||latv.map((_,j)=>j))){const la=latv[i],lo=lonv[i];if(!isNaN(la)&&!isNaN(lo)&&la>=-90&&la<=90&&lo>=-180&&lo<=180&&!(la===0&&lo===0)){let r=fixedR;if(!r&&radCol){const v=radCol[i];r=(!isNaN(v)&&v>0)?v:null;}pts.push({la,lo,r,cat:colv?colv[i]:null,idx:i});}}
  if(!pts.length) return;
  // MAD adaptive outlier (same as live widget)
  let ok = pts;
  if(pts.length>=5){const lats=pts.map(c=>c.la).sort((a,b)=>a-b),lons=pts.map(c=>c.lo).sort((a,b)=>a-b);const mLa=lats[Math.floor(lats.length/2)],mLo=lons[Math.floor(lons.length/2)];const madLa=lats.map(v=>Math.abs(v-mLa)).sort((a,b)=>a-b)[Math.floor(lats.length/2)];const madLo=lons.map(v=>Math.abs(v-mLo)).sort((a,b)=>a-b)[Math.floor(lons.length/2)];const sLa=Math.max(0.3,madLa*1.4826),sLo=Math.max(0.3,madLo*1.4826);const k=6;ok=pts.filter(c=>Math.abs(c.la-mLa)<=k*sLa&&Math.abs(c.lo-mLo)<=k*sLo);}
  const cats = colv?[...new Set(ok.map(c=>c.cat))]:[];
  const cc = {}; cats.forEach((c,i)=>cc[c]=PALETTE[i%PALETTE.length]);
  const m = L.map(id,{preferCanvas:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OSM"}).addTo(m);
  ok.forEach(c => {
    const col = colv?(cc[c.cat]||"#00b4d8"):"#00b4d8";
    const popup = buildPopup(D.data, p, c);
    const lyr = (c.r!==null&&c.r!==undefined)
      ? L.circle([c.la,c.lo],{radius:c.r,fillColor:col,color:col,fillOpacity:0.2,weight:1}).bindPopup(popup,{maxWidth:280})
      : L.circleMarker([c.la,c.lo],{radius:4,fillColor:col,color:"rgba(0,0,0,0.3)",fillOpacity:0.85,weight:0.5}).bindPopup(popup,{maxWidth:280});
    lyr.addTo(m);
  });
  if(ok.length) m.fitBounds(L.latLngBounds(ok.map(c=>[c.la,c.lo])),{padding:[14,14]});
}
function buildPopup(data, spec, pt) {
  if (spec.popup_col && data[spec.popup_col]) return escTxt(String(data[spec.popup_col][pt.idx] ?? ""));
  const skip = new Set([spec.lat_col, spec.lon_col]);
  const lines = [];
  for (const [col, vals] of Object.entries(data)) {
    if (skip.has(col)) continue;
    const v = vals[pt.idx];
    if (v === null || v === undefined || v === "") continue;
    lines.push("<b>" + escTxt(col) + ":</b> " + escTxt(String(v)));
    if (lines.length >= 7) break;
  }
  return lines.join("<br/>");
}

function renderHeatmapExport(p, id, idx) {
  const latv=(D.data[p.lat_col]||[]).map(Number),lonv=(D.data[p.lon_col]||[]).map(Number);
  const pts = [];
  for(const i of (idx||latv.map((_,j)=>j))){const la=latv[i],lo=lonv[i];if(!isNaN(la)&&!isNaN(lo)&&la>=-90&&la<=90&&lo>=-180&&lo<=180&&!(la===0&&lo===0)){pts.push([la,lo,p.intensity_col&&D.data[p.intensity_col]?(+D.data[p.intensity_col][i]||1):1]);}}
  if(!pts.length) return;
  const m = L.map(id,{preferCanvas:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OSM"}).addTo(m);
  L.heatLayer(pts,{radius:p.heat_radius||20,blur:p.heat_blur||10,maxZoom:17}).addTo(m);
  m.fitBounds(L.latLngBounds(pts.map(pt=>[pt[0],pt[1]])),{padding:[10,10]});
}

function renderShiftMap(p, id, idx) {
  const la1c=(D.data[p.lat_old]||[]).map(Number),lo1c=(D.data[p.lon_old]||[]).map(Number);
  const la2c=(D.data[p.lat_new]||[]).map(Number),lo2c=(D.data[p.lon_new]||[]).map(Number);
  const lab = p.label_col && D.data[p.label_col]?D.data[p.label_col]:null;
  const fixedR = (typeof p.radius==="number"&&p.radius>0)?(p.radius<=5?Math.round(p.radius*1000):Math.round(p.radius)):null;
  const rTgt = p.radius_target==="old"?"old":p.radius_target==="both"?"both":"new";
  const pairs = [];
  for(const i of (idx||la1c.map((_,j)=>j))){const a=la1c[i],b=lo1c[i],c=la2c[i],d=lo2c[i];const o=!isNaN(a)&&!isNaN(b)&&a>=-90&&a<=90&&b>=-180&&b<=180&&!(a===0&&b===0);const n=!isNaN(c)&&!isNaN(d)&&c>=-90&&c<=90&&d>=-180&&d<=180&&!(c===0&&d===0);if(o||n)pairs.push({la1:a,lo1:b,la2:c,lo2:d,oldOk:o,newOk:n,label:lab?String(lab[i]??""):null});}
  if(!pairs.length) return;
  // MAD adaptive outlier (same as live widget)
  if(pairs.length>=5){const allCoords=[];pairs.forEach(x=>{if(x.oldOk)allCoords.push({la:x.la1,lo:x.lo1});if(x.newOk)allCoords.push({la:x.la2,lo:x.lo2});});const lats=allCoords.map(c=>c.la).sort((a,b)=>a-b),lons=allCoords.map(c=>c.lo).sort((a,b)=>a-b);const mLa=lats[Math.floor(lats.length/2)],mLo=lons[Math.floor(lons.length/2)];const madLa=lats.map(v=>Math.abs(v-mLa)).sort((a,b)=>a-b)[Math.floor(lats.length/2)];const madLo=lons.map(v=>Math.abs(v-mLo)).sort((a,b)=>a-b)[Math.floor(lons.length/2)];const sLa=Math.max(0.3,madLa*1.4826),sLo=Math.max(0.3,madLo*1.4826);const k=6;const thLa=k*sLa,thLo=k*sLo;pairs.forEach(x=>{if(x.oldOk&&(Math.abs(x.la1-mLa)>thLa||Math.abs(x.lo1-mLo)>thLo))x.oldOk=false;if(x.newOk&&(Math.abs(x.la2-mLa)>thLa||Math.abs(x.lo2-mLo)>thLo))x.newOk=false;});}
  const valid = pairs.filter(x=>x.oldOk||x.newOk);
  if(!valid.length) return;
  const m = L.map(id,{preferCanvas:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OSM"}).addTo(m);
  const bounds = [];
  valid.forEach(x => {
    const dist = (x.oldOk&&x.newOk)?haversine(x.la1,x.lo1,x.la2,x.lo2):null;
    const popup = [x.label?"<b>"+x.label+"</b><br/>":"",x.oldOk?"🔴 Old: "+x.la1.toFixed(5)+", "+x.lo1.toFixed(5)+"<br/>":"",x.newOk?"🟢 New: "+x.la2.toFixed(5)+", "+x.lo2.toFixed(5)+"<br/>":"",dist!==null?"<b>📏 "+fmtDist(dist)+"</b>":""].join("");
    if(x.oldOk&&x.newOk) L.polyline([[x.la1,x.lo1],[x.la2,x.lo2]],{color:"#888",weight:1,opacity:0.5,dashArray:"4,3"}).bindPopup(popup,{maxWidth:200}).addTo(m);
    if(x.oldOk){bounds.push([x.la1,x.lo1]);L.circleMarker([x.la1,x.lo1],{radius:4,fillColor:"#ef476f",color:"#fff",fillOpacity:0.9,weight:1}).bindPopup(popup,{maxWidth:200}).addTo(m);}
    if(x.newOk){bounds.push([x.la2,x.lo2]);L.circleMarker([x.la2,x.lo2],{radius:4,fillColor:"#06d6a0",color:"#fff",fillOpacity:0.9,weight:1}).bindPopup(popup,{maxWidth:200}).addTo(m);}
    if(fixedR){if((rTgt==="new"||rTgt==="both")&&x.newOk)L.circle([x.la2,x.lo2],{radius:fixedR,fillColor:"#06d6a0",color:"#06d6a0",fillOpacity:0.12,weight:1,opacity:0.5}).addTo(m);if((rTgt==="old"||rTgt==="both")&&x.oldOk)L.circle([x.la1,x.lo1],{radius:fixedR,fillColor:"#ef476f",color:"#ef476f",fillOpacity:0.12,weight:1,opacity:0.5}).addTo(m);}
  });
  if(bounds.length) m.fitBounds(L.latLngBounds(bounds),{padding:[14,14]});
}

// =================================================================

document.getElementById("expand-btn").onclick = function() {
  vizExpanded = !vizExpanded;
  const main = document.getElementById("main");
  const btn  = document.getElementById("expand-btn");
  if (vizExpanded) {
    main.classList.add("viz-only");
    btn.textContent = "⊠";
    btn.title = "Restore layout";
  } else {
    main.classList.remove("viz-only");
    btn.textContent = "⤢";
    btn.title = "Expand visualization";
  }
  // Resize after CSS transition
  setTimeout(() => {
    if (leafletMap) leafletMap.invalidateSize();
    const pd = document.getElementById("plotly-div");
    if (pd.style.display !== "none") Plotly.Plots.resize(pd);
  }, 60);
};

// =================================================================

document.getElementById("settings-btn").onclick = function(e) {
  e.stopPropagation();
  const p = document.getElementById("settings-panel");
  p.style.display = p.style.display === "block" ? "none" : "block";
};
document.getElementById("save-settings-btn").onclick = function() {
  CFG.lfUrl  = document.getElementById("cfg-url").value.trim();
  CFG.lfKey  = document.getElementById("cfg-key").value.trim();
  CFG.lfFlow = document.getElementById("cfg-flow").value.trim();
  saveConfig();
  document.getElementById("settings-panel").style.display = "none";
  // Tell the user exactly which fields are still missing rather than a
  // generic "saved" — they may have skipped one and would otherwise have
  // to discover it via a failed request.
  const missing = [];
  if (!CFG.lfUrl)  missing.push("Langflow URL");
  if (!CFG.lfKey)  missing.push("API Key");
  if (!CFG.lfFlow) missing.push("Flow ID");
  if (missing.length) {
    sysMsg("⚠ Settings saved, but missing: " + missing.join(", ") + ". Open ⚙ to complete.");
  } else {
    sysMsg("✓ Settings saved. Ready to query.");
  }
};
document.addEventListener("click", e => {
  const wrap = document.getElementById("settings-wrap");
  if (!wrap.contains(e.target))
    document.getElementById("settings-panel").style.display = "none";
});

// Theme toggle
function toggleTheme() {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  localStorage.setItem("grist_widget_theme", isLight ? "light" : "dark");
}
// Load saved theme
(function() {
  if (localStorage.getItem("grist_widget_theme") === "light") document.body.classList.add("light");
})();
