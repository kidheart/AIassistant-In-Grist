<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>AI Data Widget</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js" onerror="cdnFailed('Grist API')"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" onerror="cdnFailed('Plotly')"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" id="leaflet-css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onerror="cdnFailed('Leaflet')"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" onerror="cdnFailed('MarkerCluster')"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js" onerror="cdnFailed('Leaflet.heat')"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" onerror="cdnFailed('html2canvas')"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#13131f;color:#e0e0e0;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  font-size:13px;
}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;background:#1a1a2e;
  border-bottom:1px solid #0f3460;flex-shrink:0;min-height:38px;
}
#table-select{
  flex:1;padding:4px 8px;
  background:#0f3460;color:#e0e0e0;
  border:1px solid #1e4d80;border-radius:5px;font-size:12px;
}
#table-info{font-size:10px;color:#555;white-space:nowrap;}
.icon-btn{
  padding:4px 8px;background:#0f3460;color:#aaa;
  border:1px solid #1e4d80;border-radius:5px;cursor:pointer;font-size:12px;
  white-space:nowrap;
}
.icon-btn:hover{background:#1e4d80;color:#e0e0e0;}

/* ── SETTINGS PANEL ── */
#settings-wrap{position:relative;}
#settings-panel{
  display:none;position:absolute;top:32px;right:0;
  background:#1a1a2e;border:1px solid #0f3460;
  border-radius:8px;padding:12px;z-index:300;min-width:270px;
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
}
#settings-panel label{display:block;font-size:10px;color:#888;margin-top:8px;}
#settings-panel input{
  width:100%;padding:5px 8px;background:#13131f;color:#e0e0e0;
  border:1px solid #0f3460;border-radius:4px;font-size:11px;margin-top:3px;
}
#save-settings-btn{
  width:100%;margin-top:10px;padding:6px;
  background:#00b4d8;color:#fff;border:none;border-radius:4px;
  cursor:pointer;font-size:12px;font-weight:600;
}

/* ── MAIN SPLIT ── */
#main{flex:1;display:flex;overflow:hidden;}

/* viz-only mode: hide chat, full-width viz */
#main.viz-only #chat-panel{display:none;}
#main.viz-only #viz-panel{flex:1;}

/* ── CHAT PANEL ── */
#chat-panel{
  width:300px;min-width:220px;display:flex;
  flex-direction:column;border-right:1px solid #0f3460;
  transition:width 0.15s;flex-shrink:0;
}
#messages{
  flex:1;overflow-y:auto;padding:8px;
  display:flex;flex-direction:column;gap:6px;
}
#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px;}

.msg{max-width:94%;padding:7px 10px;border-radius:10px;line-height:1.5;word-break:break-word;}
.msg.user{align-self:flex-end;background:#0f3460;color:#e0e0e0;border-bottom-right-radius:3px;}
.msg.ai{align-self:flex-start;background:#1e1e35;color:#e0e0e0;border:1px solid #252545;border-bottom-left-radius:3px;}
.msg.error{background:#2d1515;color:#ff7070;border:1px solid #5c2222;}
.msg.sys{align-self:center;background:transparent;color:#444;font-size:10px;border:none;padding:2px 0;text-align:center;}
.msg.debug{align-self:flex-start;background:#0d2a0d;color:#6fc86f;border:1px solid #1a4a1a;font-size:10px;font-family:monospace;max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;}

.thinking{display:flex;align-items:center;gap:8px;color:#888;padding:7px 10px;}
.dot{width:7px;height:7px;border-radius:50%;background:#00b4d8;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

/* ── SUGGESTIONS ── */
#suggestions{
  padding:6px 8px;border-top:1px solid #0f3460;
  display:none;flex-wrap:wrap;gap:5px;
  background:#16162a;flex-shrink:0;
}
.chip{
  padding:4px 9px;background:#0f3460;color:#90d0e8;
  border:1px solid #1e4d80;border-radius:12px;
  cursor:pointer;font-size:10px;white-space:nowrap;
  transition:background 0.1s;
}
.chip:hover{background:#1e4d80;color:#e0e0e0;}

/* ── FILTER CHIPS ── */
#filter-chips{
  padding:4px 8px;display:none;flex-wrap:wrap;gap:4px;
  background:#16162a;border-top:1px solid #0f3460;flex-shrink:0;
}
.fchip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;background:#1a3a1a;color:#6fc86f;
  border:1px solid #2a5a2a;border-radius:10px;
  font-size:10px;cursor:pointer;white-space:nowrap;
}
.fchip:hover{background:#2a5a2a;}
.fchip .fchip-close{font-size:12px;color:#8fdf8f;margin-left:2px;}

/* ── INPUT ── */
#input-area{
  display:flex;gap:6px;padding:8px;
  border-top:1px solid #0f3460;flex-shrink:0;
}
#user-input{
  flex:1;padding:6px 10px;background:#1a1a2e;color:#e0e0e0;
  border:1px solid #0f3460;border-radius:7px;font-size:12px;
  resize:none;height:32px;overflow:hidden;font-family:inherit;
}
#user-input:focus{outline:none;border-color:#00b4d8;}
#send-btn{
  padding:6px 12px;background:#00b4d8;color:#fff;
  border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;
}
#send-btn:disabled{background:#333;color:#666;cursor:not-allowed;}

/* ── VIZ PANEL ── */
#viz-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#viz-toolbar{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-bottom:1px solid #0f3460;flex-shrink:0;
}
#viz-title{font-size:11px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

#chart-wrap{flex:1;position:relative;overflow:hidden;}
#placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:#333;
}
#placeholder p{font-size:11px;color:#3a3a5a;text-align:center;padding:0 20px;line-height:1.6;}
#plotly-div{position:absolute;inset:0;display:none;}
#map-div{position:absolute;inset:0;display:none;}

/* ── MAP LEGEND ── */
#map-legend{
  position:absolute;bottom:24px;left:10px;z-index:500;
  background:rgba(26,26,46,0.92);border:1px solid #0f3460;
  border-radius:6px;padding:8px 10px;font-size:10px;
  display:none;max-width:180px;color:#c0c0d0;
}
#map-legend .leg-item{display:flex;align-items:center;gap:6px;margin-top:4px;}
#map-legend .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
#map-legend .leg-title{font-size:10px;color:#aaa;font-weight:700;}
#map-legend .leg-shift{color:#888;font-size:12px;letter-spacing:2px;}

/* light */
body.light #map-legend{
  background:rgba(255,255,255,0.94);border-color:#d0d5dd;color:#333;
}
body.light #map-legend .leg-title{color:#555;}
body.light #map-legend .leg-shift{color:#999;}

/* modebar visible for full-size charts (hidden only in dashboard mini-panels via Plotly config) */

/* ── DASHBOARD GRID ── */
#dashboard-grid{
  position:absolute;inset:0;display:none;
  grid-template-columns:repeat(12,1fr);
  grid-auto-rows:min-content;
  gap:8px;padding:8px;
  overflow-y:auto;background:#13131f;
}
#dashboard-grid::-webkit-scrollbar{width:6px;}
#dashboard-grid::-webkit-scrollbar-thumb{background:#0f3460;border-radius:3px;}
.dash-panel{
  background:#16162a;border:1px solid #0f3460;border-radius:7px;
  display:flex;flex-direction:column;overflow:hidden;
  grid-column:span 6;min-height:280px;
  resize:both;overflow:auto;min-width:200px;min-height:140px;
}
/* Custom resize handle */
.dash-panel::-webkit-resizer{
  background:linear-gradient(135deg,transparent 30%,#0f3460 30%,#0f3460 37%,transparent 37%,
                     transparent 60%,#0f3460 60%,#0f3460 67%,transparent 67%);
}
.dash-panel.stat{grid-column:span 3;min-height:108px;}
.dash-panel.full-row{grid-column:span 12;min-height:360px;}
.dash-panel.wide-row{grid-column:span 12;min-height:180px;}

/* ── STAT CARD ── */
.stat-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:6px 10px;text-align:center;
}
.stat-value{
  font-size:30px;font-weight:700;
  color:#00b4d8;letter-spacing:-0.5px;
  line-height:1.05;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.stat-sub{font-size:10px;color:#666;margin-top:4px;}
.dash-panel-header{
  display:flex;align-items:center;gap:5px;
  padding:5px 9px;border-bottom:1px solid #0f3460;
  font-size:11px;flex-shrink:0;
}
.dash-panel-title{
  flex:1;color:#c0c0d0;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dash-panel-actions{display:flex;gap:2px;}
.dash-panel-actions button{
  background:transparent;border:none;color:#666;cursor:pointer;
  padding:2px 6px;font-size:12px;border-radius:3px;
}
.dash-panel-actions button:hover{background:#0f3460;color:#00b4d8;}
.dash-panel-body{flex:1;position:relative;min-height:0;}
.dash-panel-body .leaflet-container{background:#1a1a2e;}

/* ── LIGHT THEME ── */
body.light{background:#f4f5f7;color:#1a1a2e;}
body.light #topbar{background:#fff;border-color:#d0d5dd;}
body.light #table-select{background:#e8ecf1;color:#1a1a2e;border-color:#c0c7d0;}
body.light #chat-panel{border-color:#d0d5dd;}
body.light .msg.user{background:#dbeafe;color:#1a1a2e;}
body.light .msg.ai{background:#fff;color:#1a1a2e;border-color:#d0d5dd;}
body.light #user-input{background:#fff;color:#1a1a2e;border-color:#d0d5dd;}
body.light #input-area{border-color:#d0d5dd;}
body.light #suggestions{background:#f0f2f6;border-color:#d0d5dd;}
body.light .chip{background:#dbeafe;color:#1e4d80;border-color:#b0c8e8;}
body.light .dash-panel{background:#fff;border-color:#d0d5dd;}
body.light #dashboard-grid{background:#f4f5f7;}
body.light #placeholder p{color:#999;}
body.light .icon-btn{background:#e8ecf1;color:#555;border-color:#c0c7d0;}
body.light #settings-panel{background:#fff;border-color:#d0d5dd;}
body.light #settings-panel input{background:#f4f5f7;color:#1a1a2e;border-color:#d0d5dd;}
body.light #cdn-error{background:#fef2f2;color:#991b1b;border-color:#fca5a5;}
body.light .msg.error{background:#fef2f2;color:#991b1b;border-color:#fca5a5;}
body.light .msg.sys{color:#888;}
body.light .msg.debug{background:#ecfdf5;color:#065f46;border-color:#a7f3d0;}
body.light #table-info{color:#888;}
body.light .icon-btn:hover{background:#d0d5dd;color:#1a1a2e;}
body.light #viz-toolbar{border-color:#d0d5dd;}
body.light #viz-title{color:#666;}
body.light #filter-chips{background:#f0f2f6;border-color:#d0d5dd;}
body.light .fchip{background:#dbeafe;color:#1e4d80;border-color:#b0c8e8;}
body.light .fchip:hover{background:#bfdbfe;}
body.light .dash-panel-header{border-color:#d0d5dd;}
body.light .dash-panel-title{color:#333;}
body.light .dash-panel-actions button{color:#888;}
body.light .dash-panel-actions button:hover{background:#e8ecf1;color:#1e4d80;}
body.light .dash-panel-body .leaflet-container{background:#e8ecf1;}
body.light #version-tag{color:#aaa !important;}
body.light .thinking{color:#999;}
body.light #messages::-webkit-scrollbar-thumb{background:#d0d5dd;}
body.light #dashboard-grid::-webkit-scrollbar-thumb{background:#d0d5dd;}
body.light #clear-memory-btn{background:#fef2f2 !important;color:#991b1b !important;border-color:#fca5a5 !important;}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid #00b4d8;outline-offset:2px;}
.icon-btn:focus-visible,#send-btn:focus-visible{border-color:#00b4d8;}
[role]{outline:none;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #main{flex-direction:column;}
  #chat-panel{width:100%!important;max-height:40vh;min-width:unset;border-right:none;border-bottom:1px solid #0f3460;}
  #viz-toolbar{flex-wrap:wrap;}
  .dash-panel{grid-column:span 12!important;min-height:220px!important;}
  .dash-panel.stat{grid-column:span 6!important;min-height:90px!important;}
  .icon-btn{font-size:10px;padding:3px 6px;}
}

@media(max-width:480px){
  #topbar{flex-wrap:wrap;}
  #table-select{font-size:11px;}
  .dash-panel.stat{grid-column:span 12!important;}
}
</style>
</head>
<body>

<div id="cdn-error" style="display:none;background:#2d1515;color:#ff7070;padding:8px 16px;font-size:12px;text-align:center;border-bottom:1px solid #5c2222;"></div>

<div id="topbar">
  <select id="table-select"><option value="">Connecting to Grist...</option></select>
  <span id="table-info"></span>
  <button class="icon-btn" id="theme-btn" title="Toggle light/dark theme" onclick="toggleTheme()">🌓</button>
  <button class="icon-btn" id="templates-btn" title="Dashboard templates" onclick="showTemplates()">📋</button>
  <button class="icon-btn" id="auto-dashboard-btn" title="Auto-generate dashboard">✨ Dashboard</button>
  <div id="settings-wrap">
    <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
    <div id="settings-panel">
      <strong style="font-size:12px;">Connection Settings</strong>
      <label>Langflow URL</label>
      <input id="cfg-url"  type="text"     placeholder="http://localhost:17860"/>
      <label>Langflow API Key</label>
      <input id="cfg-key"  type="password" placeholder="Enter your API key..."/>
      <label>Flow ID</label>
      <input id="cfg-flow" type="text"     placeholder="Paste your Langflow Flow ID..."/>
      <button id="save-settings-btn">Save</button>
      <div style="font-size:10px;color:#666;margin-top:8px;line-height:1.5;">
        These are stored only in your browser (localStorage). They are never sent anywhere except to your own Langflow instance.
      </div>
    </div>
  </div>
</div>

<div id="main">
  <div id="chat-panel">
    <div id="messages">
      <div class="msg sys">Initialising...</div>
    </div>
    <div id="suggestions"></div>
    <div id="filter-chips"></div>
    <div id="input-area">
      <textarea id="user-input" placeholder="Ask about the data..." list="col-suggestions"></textarea>
      <datalist id="col-suggestions"></datalist>
      <button id="send-btn">Send</button>
    </div>
    <div id="version-tag" style="text-align:center;font-size:9px;color:#333;padding:2px 0;flex-shrink:0;">v28</div>
  </div>

  <div id="viz-panel">
    <div id="viz-toolbar">
      <span id="viz-title">Select a table to begin</span>
      <button class="icon-btn" id="download-btn" style="display:none" title="Download as PNG image" onclick="downloadViz()">⬇ PNG</button>
      <button class="icon-btn" id="download-html-btn" style="display:none" title="Download interactive HTML" onclick="downloadMapHTML()">⬇ HTML</button>
      <button class="icon-btn" id="export-csv-btn" style="display:none" title="Export data as CSV" onclick="exportCSV()">⬇ CSV</button>
      <button class="icon-btn" id="export-json-btn" style="display:none" title="Export data as JSON" onclick="exportJSON()">⬇ JSON</button>
      <button class="icon-btn" id="add-panel-btn" style="display:none" title="Add panel to dashboard" onclick="addDashboardPanel()">➕</button>
      <button class="icon-btn" id="save-dash-btn" style="display:none" title="Save dashboard" onclick="promptSaveDashboard()">💾</button>
      <button class="icon-btn" id="refresh-btn" style="display:none" title="Refresh table data" onclick="refreshTable()">🔄</button>
      <button class="icon-btn" id="clear-btn" style="display:none" title="Clear chart" onclick="clearViz()">✕</button>
      <button class="icon-btn" id="expand-btn" title="Expand visualization">⤢</button>
    </div>
    <div id="chart-wrap">
      <div id="placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2a2a4a" stroke-width="1.5">
          <path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/>
        </svg>
        <p>Select a table, then use the suggestion chips<br/>or ask a question to generate charts and maps.</p>
      </div>
      <div id="plotly-div"></div>
      <div id="map-div">
        <div id="map-legend"></div>
      </div>
      <div id="dashboard-grid"></div>
    </div>
  </div>
</div>

<script>
// ── VERSION — increment on every code change. Check UI footer to verify loaded version.
const APP_VERSION = "v28";

// CDN fallback tracking
const _cdnFailures = [];
function cdnFailed(name) {
  _cdnFailures.push(name);
  const banner = document.getElementById("cdn-error");
  if (banner) {
    banner.style.display = "block";
    banner.textContent = "⚠ Failed to load: " + _cdnFailures.join(", ") + ". Check your network or CDN availability.";
  }
}

// =================================================================
//  CONFIG
// =================================================================
// Load config from localStorage; fall back to safe defaults (key must be supplied by user)
function loadConfig() {
  try {
    const raw = localStorage.getItem("grist_widget_cfg");
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.lfUrl)  CFG.lfUrl  = saved.lfUrl;
      if (saved.lfKey)  CFG.lfKey  = saved.lfKey;
      if (saved.lfFlow) CFG.lfFlow = saved.lfFlow;
    }
  } catch {}
  // Populate settings UI
  document.getElementById("cfg-url").value  = CFG.lfUrl;
  document.getElementById("cfg-key").value  = CFG.lfKey;
  document.getElementById("cfg-flow").value = CFG.lfFlow;
}

function saveConfig() {
  const cfg = {
    lfUrl:  CFG.lfUrl,
    lfKey:  CFG.lfKey,
    lfFlow: CFG.lfFlow,
  };
  try { localStorage.setItem("grist_widget_cfg", JSON.stringify(cfg)); } catch {}
}

// Connection config — empty by default. Users supply values via the ⚙
// settings panel; they persist in localStorage under "grist_widget_cfg".
// Never hard-code personal Flow IDs or API keys here.
const CFG = {
  lfUrl:  "",
  lfKey:  "",
  lfFlow: "",
};
loadConfig();
loadChat();

// First-run hint — if the user hasn't filled in the Langflow URL or Flow ID
// yet, show a friendly pointer to the ⚙ settings panel instead of letting
// them discover the requirement by a failed network request.
if (!CFG.lfUrl || !CFG.lfFlow) {
  setTimeout(() => {
    sysMsg("⚙ First-time setup: open the Settings panel (top-right) and fill in your Langflow URL, API Key, and Flow ID.");
  }, 300);
}

// Coordinate pair patterns — ordered by priority: earlier matches are checked first.
// The first detected old-coord pair and first new-coord pair win.
const COORD_PAIR_PATTERNS = [
  // Old coords: asal/lama/before/old/existing/current
  { role:"old", lat:/asal|asal_|lama|_lama|before|_before|old_|_old(_|$)|existing|_existing|current/i, lon:null },
  { role:"new", lat:/ganti|_ganti|baru|_baru|new_|_new(_|$)|replace|_replace|after|_after|proposed|_proposed/i, lon:null },
];

function guessCoordRole(colName) {
  const lower = colName.toLowerCase();
  for (const p of COORD_PAIR_PATTERNS) {
    if (p.lat.test(lower)) return p.role;
  }
  // Fallback: if no role detected but looks like a second pair, guess "new"
  return null;
}

function detectCoordPairs(geoCols) {
  // Group by role, then match lat/lon within each role
  const oldLats=[], oldLons=[], newLats=[], newLons=[], orphan=[];
  for (const c of geoCols) {
    const role = guessCoordRole(c);
    const isLat = /lat|latitude/i.test(c);
    const isLon = /lon|lng|long|longitude/i.test(c);
    if (role === "old" && isLat) oldLats.push(c);
    else if (role === "old" && isLon) oldLons.push(c);
    else if (role === "new" && isLat) newLats.push(c);
    else if (role === "new" && isLon) newLons.push(c);
    else orphan.push(c);
  }
  // Best-effort matching: first lat with first lon
  const pairs = [];
  if (oldLats.length && oldLons.length)
    pairs.push({ role:"old", lat:oldLats[0], lon:oldLons[0] });
  if (newLats.length && newLons.length)
    pairs.push({ role:"new", lat:newLats[0], lon:newLons[0] });
  // If we have orphans and no old pair, treat first pair as old
  if (!pairs.length && orphan.length >= 2) {
    const lats = orphan.filter(c => /lat|latitude/i.test(c));
    const lons = orphan.filter(c => /lon|lng|long|longitude/i.test(c));
    if (lats.length && lons.length)
      pairs.push({ role:"old", lat:lats[0], lon:lons[0] });
  }
  return { pairs, orphan };
}

function buildSampleRows(maxRows) {
  if (!tableData) return "";
  const cols = Object.keys(tableData);
  const total = Object.values(tableData)[0]?.length ?? 0;
  if (!total || !cols.length) return "";
  const n = Math.min(maxRows || 3, total);
  const rows = [];
  for (let i = 0; i < n; i++) {
    const row = {};
    cols.forEach(c => {
      let v = tableData[c][i];
      if (typeof v === "string" && v.length > 80) v = v.slice(0, 80) + "...";
      row[c] = v;
    });
    rows.push(row);
  }
  return JSON.stringify(rows, null, 2);
}

async function loadTable(id) {
  tableName = id;
  tableData = null;
  document.getElementById("table-info").textContent = "Loading...";
  clearSuggestions();
  try {
    const raw = await grist.docApi.fetchTable(id);
    const skip = new Set(["manualSort"]);
    tableData = {};
    for (const [k,v] of Object.entries(raw)) {
      if (!skip.has(k) && !k.startsWith("gristHelper")) tableData[k] = v;
    }
    const rows = Object.values(tableData)[0]?.length ?? 0;
    const cols = Object.keys(tableData).length;
    document.getElementById("table-info").textContent =
      rows.toLocaleString() + "r / " + cols + "c";
    sysMsg("✓ " + id + " — " + rows.toLocaleString() + " rows, " + cols + " cols");
    clearViz();
    // Auto-generate smart suggestions based on schema
    const meta = buildMeta();
    showSuggestions(generateSuggestions(meta));
    // Populate input auto-complete with column names
    const dl = document.getElementById("col-suggestions");
    if (dl) {
      dl.innerHTML = "";
      meta.columns.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name; dl.appendChild(opt);
      });
    }
  } catch(e) {
    sysMsg("Load error: " + e.message);
    document.getElementById("table-info").textContent = "Error";
  }
}

// =================================================================
//  AI-DRIVEN DYNAMIC COMPUTATION (No regex guessing!)
// =================================================================
function preprocessSpec(spec) {
  if (!tableData) return spec;
  const processNode = (node) => {
    // Auto-correct shift_map column names for dashboard panels
    if (node.type === "shift_map") node = autoCorrectShiftMap(node);
    if (node.distance_calc) {
      const dc = node.distance_calc;
      const n = Object.values(tableData)[0].length;
      const dists = new Array(n);
      for (let i = 0; i < n; i++) {
        const la1 = +tableData[dc.lat1]?.[i], lo1 = +tableData[dc.lon1]?.[i];
        const la2 = +tableData[dc.lat2]?.[i], lo2 = +tableData[dc.lon2]?.[i];
        if (isNaN(la1) || isNaN(lo1) || isNaN(la2) || isNaN(lo2) || la1 === 0 || la2 === 0) {
          dists[i] = null; continue;
        }
        const R = 6371;
        const dLat = (la2 - la1) * Math.PI / 180;
        const dLon = (lo2 - lo1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180) * Math.cos(la2*Math.PI/180) * Math.sin(dLon/2)**2;
        dists[i] = +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(3);
      }
      const vCol = "__distance_km__";
      tableData[vCol] = dists;
      
      // Auto-bind the computed column to the chart's value axis
      if (node.type === "stat") node.col = vCol;
      else if (node.type === "bar" || node.type === "line" || node.type === "scatter") node.y_col = vCol;
      
      sysMsg(`📐 AI computed distance dynamically: ${dc.lat1} -> ${dc.lat2}`);
    }
  };

  if (spec.type === "dashboard" && spec.panels) {
    spec.panels.forEach(processNode);
  } else {
    processNode(spec);
  }
  return spec;
}

// =================================================================
//  SMART SUGGESTIONS — auto-generated from schema
// =================================================================

// Value-based geo detection — works even when columns are named "A"/"B"/"Column1".
// A column is a likely latitude if it's numeric and the majority of values fall
// in [-90, 90] with at least some decimal precision (rules out pure integers
// like row IDs). Longitude follows the same logic with [-180, 180].
function detectGeoByValues(cols) {
  if (!tableData) return { lat: null, lon: null };
  const numericCols = cols.filter(c => c.type === "number");
  const scored = [];
  for (const c of numericCols) {
    const vals = (tableData[c.name] || []).filter(v => v !== null && v !== "" && !isNaN(+v)).map(Number);
    if (vals.length < 3) continue;
    const sample = vals.slice(0, 200);
    const inLatRange = sample.filter(v => v >= -90 && v <= 90).length / sample.length;
    const inLonRange = sample.filter(v => v >= -180 && v <= 180).length / sample.length;
    const hasDecimals = sample.filter(v => v !== Math.floor(v)).length / sample.length;
    // Latitude must be tighter (within ±90), so check it first
    if (inLatRange > 0.95 && hasDecimals > 0.5 && c.max <= 90 && c.min >= -90) {
      scored.push({ col: c, role: "lat", score: hasDecimals });
    } else if (inLonRange > 0.95 && hasDecimals > 0.5 && c.max <= 180 && c.min >= -180) {
      scored.push({ col: c, role: "lon", score: hasDecimals });
    }
  }
  // Pick the best-scoring lat and lon
  const lat = scored.filter(s => s.role === "lat").sort((a,b)=>b.score-a.score)[0];
  const lon = scored.filter(s => s.role === "lon").sort((a,b)=>b.score-a.score)[0];
  return { lat: lat?.col || null, lon: lon?.col || null };
}

function generateSuggestions(meta) {
  const chips = [];
  const cols = meta.columns;

  // Geo columns → map suggestions. Try name-based detection first, then
  // fall back to value-based detection for headerless or generic-named tables.
  let latCol = cols.find(c => /^lat(itude)?$/i.test(c.name) || c.name.toLowerCase() === "lat");
  let lonCol = cols.find(c => /^lon(gitude)?$/i.test(c.name) || c.name.toLowerCase() === "lon" || c.name.toLowerCase() === "lng");
  if (!latCol || !lonCol) {
    const guess = detectGeoByValues(cols);
    if (guess.lat && guess.lon) {
      latCol = latCol || guess.lat;
      lonCol = lonCol || guess.lon;
    }
  }
  if (latCol && lonCol) {
    chips.push({
      label: "🗺 Map all points",
      spec: { type:"map", lat_col:latCol.name, lon_col:lonCol.name,
              radius_col:null, color_col:null, popup_col:null, title:"All Points" }
    });

    // Fixed-radius quick chips (always available when geo cols exist)
    chips.push({
      label: "⭕ Map — 100m radius",
      spec: { type:"map", lat_col:latCol.name, lon_col:lonCol.name,
              radius:100, radius_col:null, color_col:null,
              popup_col:null, title:"100m Radius" }
    });
    chips.push({
      label: "⭕ Map — 500m radius",
      spec: { type:"map", lat_col:latCol.name, lon_col:lonCol.name,
              radius:500, radius_col:null, color_col:null,
              popup_col:null, title:"500m Radius" }
    });

    // If range/radius column exists → per-row coverage map
    const rangeCol = cols.find(c =>
      /^range$|^radius$|coverage|signal_range|jangkauan/i.test(c.name)
    );
    if (rangeCol) {
      chips.push({
        label: "📡 Coverage from " + rangeCol.name,
        spec: { type:"map", lat_col:latCol.name, lon_col:lonCol.name,
                radius:null, radius_col:rangeCol.name, color_col:null,
                popup_col:null, title:"Coverage — " + rangeCol.name }
      });
    }

    // Color by categorical col if exists
    const catCol = cols.find(c => c.type==="text" && c.unique_count && c.unique_count <= 15
      && !/lat|lon|id|code|date|name|addr/i.test(c.name));
    if (catCol) {
      chips.push({
        label: "🎨 Map by " + catCol.name,
        spec: { type:"map", lat_col:latCol.name, lon_col:lonCol.name,
                radius_col: null, color_col:catCol.name,
                popup_col:null, title:"By " + catCol.name }
      });
    }
  }

  // Track which columns are already claimed by geo detection so they
  // don't show up as scatter axes.
  const geoColNames = new Set([latCol?.name, lonCol?.name].filter(Boolean));

  // Categorical cols → bar / pie.
  // Show up to 3 sample values in the chip label so headerless/generic-named
  // tables (where the column name itself is uninformative) still tell the
  // user what's inside.
  const catCols = cols.filter(c =>
    c.type === "text" && c.unique_count && c.unique_count >= 2 && c.unique_count <= 40
    && !/^id$|_id$|url|email|address|nama|name$/i.test(c.name)
  );
  const formatSample = c => {
    const s = (c.sample_values || []).slice(0, 3).map(v => String(v).slice(0, 14));
    return s.length ? ` (${s.join(", ")}${(c.sample_values || []).length > 3 ? "…" : ""})` : "";
  };
  catCols.slice(0, 3).forEach(c => {
    chips.push({
      label: "📊 " + c.name + formatSample(c),
      spec: { type:"bar", x_col:c.name, y_col:null, agg:"count",
              title:c.name + " Distribution" }
    });
  });

  // Pie for the first cat col if it has few enough categories
  if (catCols.length > 0 && catCols[0].unique_count <= 12) {
    chips.push({
      label: "🥧 " + catCols[0].name + " share",
      spec: { type:"pie", names_col:catCols[0].name, values_col:null, agg:"count",
              title:catCols[0].name + " Share" }
    });
  }

  // Numeric cols → histogram of distribution. Scatter is intentionally
  // NOT auto-suggested: it requires two genuinely related continuous
  // measurements, which is rarely the case for Grist tables. Blind
  // pairing of "first two numeric columns" almost always produces a
  // degenerate plot (points collapsing onto a line). Users who actually
  // want a scatter can ask for "X vs Y" in natural language.
  const numCols = cols.filter(c => c.type === "number"
    && !geoColNames.has(c.name)
    && !/lat|lon|id|manualSort/i.test(c.name));
  numCols.slice(0, 2).forEach(c => {
    chips.push({
      label: "📐 " + c.name + " distribution",
      spec: { type:"histogram", x_col:c.name, nbins:20,
              title:c.name + " Distribution" }
    });
  });

  // Date cols → trend line
  const dateCols = cols.filter(c => c.type === "date");
  if (dateCols.length && numCols.length) {
    chips.push({
      label: "📈 " + numCols[0].name + " over " + dateCols[0].name,
      spec: { type:"line", x_col:dateCols[0].name, y_col:numCols[0].name,
              agg:"sum", date_bucket:"month",
              title:numCols[0].name + " over time" }
    });
  } else if (dateCols.length) {
    chips.push({
      label: "📈 Records over " + dateCols[0].name,
      spec: { type:"line", x_col:dateCols[0].name, y_col:null,
              agg:"count", date_bucket:"month",
              title:"Records over time" }
    });
  }

  // Always-useful generic suggestions — work regardless of column names.
  // These fire even when nothing else could be detected, so a headerless
  // import is never left empty.
  if (chips.length < 2 || !catCols.length) {
    chips.push({
      label: "🔢 Total records",
      spec: { type:"stat", title:"Total Records", agg:"count", col:null,
              sub:(meta.table || "rows").replace(/_/g, " "),
              filters:null, format:null }
    });
  }
  // Data quality audit is always available — especially helpful when
  // the user can't even tell what's in the table.
  chips.push({
    label: "🩺 Data quality check",
    spec: { type:"audit", title:"Data Quality", checks:null }
  });

  return chips;
}

function showSuggestions(chips) {
  const box = document.getElementById("suggestions");
  box.innerHTML = "";
  if (!chips.length) { box.style.display = "none"; return; }
  box.style.display = "flex";
  chips.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = c.label;
    btn.onclick = () => {
      if (c.spec) {
        renderViz(c.spec);
        addMsg("user", c.label);
        addMsg("ai", "Generated: <strong>" + c.spec.type + "</strong>" +
               (c.spec.title ? " — " + c.spec.title : ""));
      } else if (c.prompt) {
        document.getElementById("user-input").value = c.prompt;
        sendMessage();
      }
    };
    box.appendChild(btn);
  });
}
function clearSuggestions() {
  const box = document.getElementById("suggestions");
  box.innerHTML = ""; box.style.display = "none";
}

// =================================================================
//  METADATA
// =================================================================
function buildMeta() {
  if (!tableData) return null;
  const cols = [];
  for (const [name, vals] of Object.entries(tableData)) {
    if (name === "id") continue;
    const clean = vals.filter(v => v !== null && v !== undefined && v !== "");
    const sample30 = clean.slice(0, 30);

    // Detect date column: either name looks date-y AND parses, or values
    // alone look strongly date-y (works for headerless/generic-named tables).
    const nameLooksDate = /date|tarikh|tanggal|time|day|month|year/i.test(name);
    // Reject pure-numeric columns from value-based date detection — small
    // integers parse as Unix timestamps and would mis-classify ID columns.
    const stringSample = sample30.filter(v => typeof v === "string");
    let parseableDates = 0;
    let dateSpanMs = 0;
    if (sample30.length) {
      const parsed = sample30.map(parseAsDate).filter(d => d);
      parseableDates = parsed.length;
      if (parsed.length >= 2) {
        const times = parsed.map(d => d.getTime());
        dateSpanMs = safeMax(times) - safeMin(times);
      }
    }
    const dateRatio = sample30.length ? parseableDates / sample30.length : 0;
    const isDate =
      (nameLooksDate && dateRatio > 0.7) ||
      // Value-based fallback: most values are date STRINGS that span > 30 days
      (stringSample.length >= 3 && dateRatio > 0.85 && dateSpanMs > 30 * 86400 * 1000);

    const numRatio = sample30.length
      ? sample30.filter(v => typeof v==="number" || (!isNaN(+v) && v!=="")).length / sample30.length
      : 0;
    const isNum = !isDate && clean.length > 0 && numRatio > 0.7;

    const col = { name, type: isDate ? "date" : (isNum ? "number" : "text") };
    if (isDate) {
      const dates = clean.map(parseAsDate).filter(d => d).map(d => d.getTime());
      if (dates.length) {
        col.min_date = new Date(safeMin(dates)).toISOString().slice(0,10);
        col.max_date = new Date(safeMax(dates)).toISOString().slice(0,10);
      }
    } else if (isNum) {
      const nums = clean.map(Number).filter(n => !isNaN(n));
      col.min = +safeMin(nums).toFixed(3);
      col.max = +safeMax(nums).toFixed(3);
      col.avg = +(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(3);
    } else {
      const uniq = [...new Set(clean.map(String))];
      col.unique_count = uniq.length;
      // Send all values for columns with ≤50 unique values
      // so LLM can match user references to exact filter values
      col.sample_values = uniq.length <= 50 ? uniq : uniq.slice(0, 20);
    }
    cols.push(col);
  }
  const rows  = Object.values(tableData)[0]?.length ?? 0;
  // Geo detection: try column names first (`lat`, `longitude`, etc.). If no
  // hit, fall back to value-based detection so headerless / generic-named
  // tables ("A", "B", "Column1") still get recognised. Otherwise the LLM
  // is told "no geo columns" while the suggestion chips show a map button —
  // an internal contradiction that surfaces as "I can't draw a map" errors.
  let geo = cols.filter(c => /lat|lon|latitude|longitude/i.test(c.name)).map(c=>c.name);
  if (geo.length < 2) {
    const guess = detectGeoByValues(cols);
    if (guess.lat && guess.lon) geo = [guess.lat.name, guess.lon.name];
  }
  const range = cols.filter(c => /range|radius|coverage/i.test(c.name)).map(c=>c.name);
  const dates = cols.filter(c => c.type === "date").map(c => c.name);
  // Auto-detect old/new coordinate pairs for shift_map
  const coordPairs = detectCoordPairs(geo);
  const meta = {
    table: tableName, row_count: rows, columns: cols,
    ...(geo.length   ? {geo_columns: geo}     : {}),
    ...(range.length ? {range_columns: range} : {}),
    ...(dates.length ? {date_columns: dates}  : {}),
    today: new Date().toISOString().slice(0,10),
    generated_at: new Date().toISOString(),
  };
  // If coord pairs found, add explicit hints for the LLM
  if (coordPairs.pairs.length) {
    meta.coord_pairs = coordPairs.pairs.map(p => ({
      role: p.role,
      lat_column: p.lat,
      lon_column: p.lon,
    }));
    // Add a clear hint in natural language
    const oldP = coordPairs.pairs.find(p => p.role === "old");
    const newP = coordPairs.pairs.find(p => p.role === "new");
    if (oldP && newP) {
      meta._shift_map_hint =
        `For shift_map (before/after), use lat_old="${oldP.lat}", lon_old="${oldP.lon}", lat_new="${newP.lat}", lon_new="${newP.lon}".`;
      _detectedCoordPairs = { old: { lat: oldP.lat, lon: oldP.lon }, new: { lat: newP.lat, lon: newP.lon } };
    } else if (oldP) {
      meta._shift_map_hint =
        `For shift_map, old coordinates: lat_old="${oldP.lat}", lon_old="${oldP.lon}". New coords not auto-detected — check schema for replacement/baru/ganti columns.`;
      _detectedCoordPairs = { old: { lat: oldP.lat, lon: oldP.lon }, new: null };
    }
  }

  // ── Semantic role detection: helps LLM pick correct columns ──
  const likelyStatus = cols.filter(c => /status|keadaan|kesediaan|status_|_status|pending|completed/i.test(c.name) && c.type==="text").map(c=>c.name);
  const likelyOrg    = cols.filter(c => /pbt|majlis|bandar|perbandaran|owner|pemilik|pihak|authority|council/i.test(c.name) && c.type==="text").map(c=>c.name);
  const likelyType   = cols.filter(c => /jenis|type|kategori|category|tanah|land/i.test(c.name) && c.type==="text").map(c=>c.name);
  if (likelyStatus.length) meta.likely_status_columns = likelyStatus;
  if (likelyOrg.length)    meta.likely_org_columns    = likelyOrg;
  if (likelyType.length)   meta.likely_type_columns   = likelyType;
  return meta;
}

// =================================================================
//  INTENT ROUTING — minimal: only separate pure chitchat from everything else.
//  The LLM (system prompt) handles all JSON vs plain-text decisions internally.
// =================================================================
function isPureChitchat(text) {
  const t = String(text || "").trim().toLowerCase();
  // ONLY treat as chitchat when the entire message is a greeting/question.
  // The earlier prefix-match version swallowed "hi, show me a chart" because
  // it triggered on the leading "hi," — the user's actual request was lost.
  if (/^(hi|hello|hey|yo|salam|hai|你好|您好)[!.?]*$/i.test(t)) return true;
  if (/^(who are you|who r u|what are you|你是谁|help|怎么用|what can you do|你能做什么|thanks|thank you|谢谢)[!.?]*$/i.test(t)) return true;
  return false;
}

function responseModeFor(text) {
  if (isPureChitchat(text)) return "local";
  return "llm";
}

// =================================================================
//  METADATA
// =================================================================

function localConversationalReply(text) {
  const t = String(text || "").trim().toLowerCase();
  if (/^(hi|hello|hey|yo|salam|hai|你好|您好)$/i.test(t))
    return "Hello! I'm your AI data assistant. Ask me about your data — charts, maps, dashboards, and more.";
  if (/who are you|who r u|what are you|你是谁/i.test(t))
    return "I'm an AI data assistant. I can create charts, maps, dashboards, and answer questions about your Grist tables.";
  if (/help|怎么用|what can you do|你能做什么/i.test(t))
    return "You can ask me to: chart data (bar/line/pie), create maps, build dashboards, filter data, or answer analytical questions. Try 'show me a bar chart of...' or 'create a dashboard'.";
  if (/thanks|thank you|谢谢/i.test(t))
    return "You're welcome! Let me know if you need anything else.";
  return null;
}

function displayLanguageInstruction(text) {
  const t = String(text || "");
  // Chinese character detection (CJK Unified Ideographs)
  if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(t))
    return "\n\n**IMPORTANT: Respond entirely in Chinese (Simplified).**\n";
  // Malay detection — common Malay function words
  if (/\b(saya|anda|ini|itu|ada|ialah|adalah|boleh|akan|tidak|untuk|dengan|pada|dari|ke|di|yang|sebagai|jika|kerana|sebab|bila|mana|bagaimana|berapa|semua|juga|pun|lagi|sudah|belum|nak|mahu|perlu|kena|boleh|patut|sila|tolong|harap|minta|cuba|nampak|tengok|lihat|baru|lama|asal|ganti|baik|buruk|besar|kecil|tinggi|rendah|dekat|jauh|banyak|sedikit|data|carta|peta|jadual)\b/i.test(t))
    return "\n\n**IMPORTANT: Respond entirely in Bahasa Malaysia.**\n";
  return "";
}

// Decide whether the user actually wants a dashboard. Used to inject an
// explicit anti-dashboard rule when they didn't ask for one.
function userWantsDashboard(q) {
  const t = String(q || "").toLowerCase();
  // English + Malay + Chinese dashboard triggers
  return /\b(dashboard|overview|summary|comprehensive|multi[\s-]?panel|several charts|multiple charts)\b/i.test(t)
      || /\b(papan pemuka|ringkasan|gambaran keseluruhan)\b/i.test(t)
      || /(仪表板|仪表盘|儀表板|儀表盤|总览|總覽|概览|概覽|综合|綜合)/.test(t);
}

function buildPrompt(question, meta) {
  // Previous-spec context only. No persistent conversation history — each
  // question is independent; follow-ups are handled via lastSpec below.
  let prev = "";
  if (lastSpec) {
    const t = lastSpec.type || "chart";
    const title = lastSpec.title || "";
    const cols = [lastSpec.x_col, lastSpec.y_col, lastSpec.names_col, lastSpec.values_col,
      lastSpec.lat_col, lastSpec.lon_col, lastSpec.lat_old, lastSpec.lon_old,
      lastSpec.lat_new, lastSpec.lon_new, lastSpec.label_col, lastSpec.color_col,
      lastSpec.radius_col].filter(Boolean);
    const uniqueCols = [...new Set(cols)];
    prev += `\n## Previous result (reference only — ignore unless user explicitly references it)\nThe last result was a **${t}**${title ? " titled \"" + title + "\"" : ""}${uniqueCols.length ? " using columns: " + uniqueCols.join(", ") : ""}.\nOnly reuse this if the new question contains follow-up words like "modify", "change", "add to", "same", "that", "it", "this". Otherwise treat the new question as completely independent and pick the best chart type from scratch.\n`;
  }
  const samples = buildSampleRows(3);
  const common = `## Data schema
${JSON.stringify(meta, null, 2)}

## Sample data (first 3 rows)
${samples}
${prev}
${displayLanguageInstruction(question)}
`;
  // Single gap not covered by the Langflow system prompt: when the user
  // does NOT explicitly say "dashboard"/"overview"/"summary", the default
  // should be a single chart. The system prompt has trigger words for
  // dashboard but no anti-default rule.
  const wantsDash = userWantsDashboard(question);
  const routingRule = wantsDash
    ? `## Dashboard mode\nUser asked for a dashboard. Return type:"dashboard" with 4-6 panels.\n`
    : `## Routing default\nUser did NOT ask for a dashboard. Return a single chart/map/stat/table type. Use type:"dashboard" ONLY if the user uses the exact words "dashboard", "overview", "summary", "comprehensive", "papan pemuka", "总览", "概览", or "综合".\n`;

  // Capability awareness — tell the LLM what's NOT possible with this data,
  // so it doesn't propose impossible chart types and waste a clarify cycle.
  const capabilities = [];
  if (!meta.date_columns)  capabilities.push("- No date/time columns → do NOT use type:\"line\" or \"area\" with date_bucket.");
  if (!meta.geo_columns)   capabilities.push("- No latitude/longitude columns → do NOT use type:\"map\", \"shift_map\", \"heatmap\", or \"choropleth\".");
  if (!meta.coord_pairs)   capabilities.push("- No old/new coordinate pair detected → do NOT use type:\"shift_map\" or distance_calc.");
  const capabilityBlock = capabilities.length
    ? `\n## Data capabilities (HARD CONSTRAINTS)\n${capabilities.join("\n")}\n`
    : "";

  const hints = [
    meta._shift_map_hint || "",
    meta.coord_pairs ? `coord_pairs: ${JSON.stringify(meta.coord_pairs)}` : "",
    meta.likely_status_columns ? `Likely status/condition columns: ${JSON.stringify(meta.likely_status_columns)}` : "",
    meta.likely_org_columns    ? `Likely organisation/PBT columns: ${JSON.stringify(meta.likely_org_columns)}` : "",
    meta.likely_type_columns   ? `Likely type/category columns: ${JSON.stringify(meta.likely_type_columns)}` : "",
    "Use exact sample_values for filter values. If a user word maps to multiple sample_values, return type:\"clarify\"."
  ].filter(Boolean).join("\n");
  return `${routingRule}${capabilityBlock}
## Column hints
${hints ? hints + "\n" : "(none detected)\n"}

${common}
## User question
${question}`;
}

// =================================================================
//  LANGFLOW  — 45s timeout, AbortController
// =================================================================
async function callLangflow(prompt, externalController) {
  // Fail fast with a clear message if the user hasn't filled the settings
  // panel yet. Without this we'd just throw a confusing fetch / network
  // error and the user wouldn't know to open ⚙.
  if (!CFG.lfUrl || !CFG.lfFlow) {
    throw new Error("Not configured. Open the ⚙ settings panel and fill in your Langflow URL, API Key, and Flow ID.");
  }
  const controller = externalController || new AbortController();
  const timer = setTimeout(() => controller.abort(), 180000); // 3 minutes
  const MAX_RETRIES = 3;
  let lastError = null;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const r = await fetch(`${CFG.lfUrl}/api/v1/run/${CFG.lfFlow}?stream=false`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "x-api-key": CFG.lfKey },
        body: JSON.stringify({ input_type:"chat", output_type:"chat", input_value: prompt }),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!r.ok) {
        const status = r.status;
        const body = await r.text().catch(() => "");
        const err = new Error("Langflow HTTP " + status + (body ? ": " + body.slice(0,200) : ""));
        err.status = status;
        throw err;
      }
      const d = await r.json();
      try { return d.outputs[0].outputs[0].results.message.text; } catch{}
      try { return d.outputs[0].outputs[0].artifacts.message; } catch{}
      try { return d.outputs[0].outputs[0].messages[0].message; } catch{}
      return JSON.stringify(d);
    } catch(e) {
      clearTimeout(timer);
      lastError = e;
      if (e.name === "AbortError") {
        throw new Error("Timeout (180s) — model is overwhelmed. Try simpler/shorter questions, or break dashboard into individual charts.");
      }
      // Retry on 429, 5xx, or network errors. Don't retry on 4xx client errors.
      const retryable = !e.status || e.status >= 500 || e.status === 429;
      if (attempt < MAX_RETRIES && retryable && !controller.signal.aborted) {
        const delay = Math.pow(2, attempt) * 1000; // 1s, 2s, 4s (on attempts 0,1,2 = 3 retries after first)
        sysMsg(`⟳ Retry ${attempt + 1}/${MAX_RETRIES} in ${delay/1000}s...`);
        await new Promise(r => setTimeout(r, delay));
      } else {
        throw lastError;
      }
    }
  }
  throw lastError;
}

// Streamed Langflow call — tokens arrive as they're generated, updating the UI in real-time.
// Falls back to non-streamed call if Langflow's SSE endpoint is unavailable.
async function callLangflowStream(prompt, onToken, externalController) {
  if (!CFG.lfUrl || !CFG.lfFlow) {
    throw new Error("Not configured. Open the ⚙ settings panel and fill in your Langflow URL, API Key, and Flow ID.");
  }
  const controller = externalController || new AbortController();
  const timer = setTimeout(() => controller.abort(), 300000); // 5 min for streaming
  const MAX_RETRIES = 2;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const r = await fetch(`${CFG.lfUrl}/api/v1/run/${CFG.lfFlow}?stream=true`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "x-api-key": CFG.lfKey },
        body: JSON.stringify({ input_type:"chat", output_type:"chat", input_value: prompt }),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!r.ok) {
        const status = r.status;
        const body = await r.text().catch(() => "");
        const err = new Error("Langflow HTTP " + status + (body ? ": " + body.slice(0,200) : ""));
        err.status = status;
        throw err;
      }

      // If the stream endpoint exists, read SSE tokens
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE frames: "data: {...}\n\n"
        const lines = buffer.split("\n");
        buffer = lines.pop() || ""; // keep incomplete line in buffer
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") continue;
          try {
            const chunk = JSON.parse(data);
            // Try common Langflow SSE payload shapes
            const token =
              chunk?.outputs?.[0]?.outputs?.[0]?.results?.message?.text ??
              chunk?.outputs?.[0]?.outputs?.[0]?.artifacts?.message ??
              chunk?.outputs?.[0]?.outputs?.[0]?.messages?.[0]?.message ??
              chunk?.text ??
              chunk?.message ??
              chunk?.chunk ??
              chunk?.token ??
              "";
            if (token) { fullText += token; onToken(token, fullText); }
          } catch { /* skip unparseable SSE frames */ }
        }
      }
      if (fullText) return fullText;

      // Stream gave nothing — fall through to retry as non-streamed
      throw new Error("Stream returned empty — retrying as non-streamed");
    } catch(e) {
      clearTimeout(timer);
      if (e.name === "AbortError") throw new Error("Request timed out or was cancelled.");
      const retryable = !e.status || e.status >= 500 || e.status === 429 || e.message.includes("empty");
      if (attempt < MAX_RETRIES && retryable && !controller.signal.aborted) {
        const delay = Math.pow(2, attempt) * 1500;
        sysMsg(`⟳ Retry ${attempt+1}/${MAX_RETRIES} in ${delay/1000}s...`);
        await new Promise(r => setTimeout(r, delay));
        // On last retry, fall back to non-streamed
        if (attempt === MAX_RETRIES - 1) {
          sysMsg("⟳ Streaming failed — trying non-streamed call...");
          return callLangflow(prompt, controller);
        }
      } else { throw e; }
    }
  }
  // Ultimate fallback
  return callLangflow(prompt, controller);
}

}

  try {

    document.querySelectorAll("#messages .msg").forEach(el => {
      const role = el.classList.contains("user") ? "user" : el.classList.contains("ai") ? "ai" : el.classList.contains("error") ? "error" : "sys";

function renderPlainFromSpec(spec) {
  if (!spec || typeof spec !== "object") return false;
  if (spec.type === "clarify") {
    const options = Array.isArray(spec.options) && spec.options.length
      ? "<br/><br/>" + spec.options.map(o => "• " + escapeHtml(o)).join("<br/>")
      : "";
    addMsg("ai", escapeHtml(spec.question || "I need one more detail to answer clearly.") + options);
    return true;
  }
  if (spec.type === "error") {
    addMsg("error", escapeHtml(spec.message || spec.title || "The request could not be completed."));
    return true;
  }
  addMsg("ai", escapeHtml(spec.message || spec.title || "I prepared a structured result, but this request is better answered in plain text."));
  return true;
}

function handleNonRenderableSpec(spec) {
  if (!spec || typeof spec !== "object") return false;
  if (spec.type === "clarify") {
    renderPlainFromSpec(spec);
    return true;
  }
  if (spec.type === "error") {
    renderPlainFromSpec(spec);
    return true;
  }
  const renderable = new Set(["bar","line","area","pie","scatter","ratio_bar","histogram","box","heatmap","choropleth","map","shift_map","stat","audit","dashboard","table","action"]);
  if (!renderable.has(spec.type)) {
    addMsg("error", "Unsupported response type: " + escapeHtml(spec.type || "(missing)"));
    return true;
  }
  return false;
}

// Natural-language filter parser + chip UI
function parseFilters(text) {
  const filters = [];
  let clean = text;
  if (!tableData) return { clean, filters };
  const cols = Object.keys(tableData).map(c => c.toLowerCase());

  // Pattern: "where Col = Value" / "Col is Value" / "Col equals Value"
  const whereRe = /(?:where\s+)?(\w[\w\s]*?)\s+(?:is|equals?|=|==)\s+(['"]?)([^'",;.!?]+?)\2(?:\s*(?:,|;|\.|!|\?|$|and|\s+where))/gi;
  let m;
  while ((m = whereRe.exec(text)) !== null) {
    const colName = m[1].trim();
    const value = m[3].trim();
    // Fuzzy match column name
    const matchedCol = cols.find(c => c === colName.toLowerCase() || c.includes(colName.toLowerCase()));
    if (matchedCol && value) {
      filters.push({ col: matchedCol, op: "=", value });
      clean = clean.replace(m[0], "").trim();
    }
  }

  // Pattern: "only Value" / "just Value" → filter on most likely categorical column
  const onlyRe = /\b(?:only|just|filter\s+by)\s+(['"]?)([^'",;.!?]+?)\1(?:\s*(?:,|;|\.|!|\?|$|\s+and|\s+or))/gi;
  while ((m = onlyRe.exec(clean)) !== null) {
    const value = m[2].trim();
    if (value && value.length < 30) {
      filters.push({ col: "*", op: "=", value }); // * = auto-detect from sample_values
      clean = clean.replace(m[0], "").trim();
    }
  }

  // Deduplicate
  const seen = new Set();
  const unique = filters.filter(f => {
    const key = f.col + "=" + f.value;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  return { clean: clean || text, filters: unique };
}

function renderFilterChips() {
  const container = document.getElementById("filter-chips");
  if (!container) return;

  `).join("");
}

function removeFilterChip(idx) {

}

async function sendMessage() {
  if (busy) return;
  const inp = document.getElementById("user-input");
  const text = inp.value.trim();
  if (!text) return;

  const mode = responseModeFor(text);
  if (mode === "local") {
    inp.value = "";
    addMsg("user", text);
    const reply = localConversationalReply(text) || "I am your AI data assistant.";
    addMsg("ai", escapeHtml(reply));
    return;
  }

  if (!tableData) { addMsg("error", "Please select a table first."); return; }

  // Parse natural-language filters from input
  const parsed = parseFilters(text);
  if (parsed.filters.length) {
    _activeFilters = [..._activeFilters, ...parsed.filters];
    renderFilterChips();
  }
  const queryText = parsed.clean || text;

  // Cancel any in-flight request
  if (activeController) {
    activeController.abort();
    activeController = null;
  }

  inp.value = "";
  addMsg("user", text);

  const thinkEl = document.createElement("div");
  thinkEl.className = "msg ai";
  thinkEl.innerHTML =
    '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div> <span id="elapsed" style="font-size:10px;color:#555;margin-left:4px;"></span></div>';
  document.getElementById("messages").appendChild(thinkEl);
  thinkEl.scrollIntoView({behavior:"smooth"});

  busy = true;
  document.getElementById("send-btn").disabled = true;

  // Race-condition guard: generation ID + AbortController
  const genId = ++requestGen;
  activeController = new AbortController();

  // Elapsed-time counter
  const startTime = Date.now();
  const elapsedEl = document.getElementById("elapsed");
  let elapsedTimer = setInterval(() => {
    if (elapsedEl) {
      const secs = Math.floor((Date.now() - startTime) / 1000);
      elapsedEl.textContent = secs > 60
        ? Math.floor(secs/60) + "m " + (secs%60) + "s"
        : secs + "s";
    }
  }, 1000);

  // Streaming token callback — updates the thinking bubble in real-time
  let streamedText = "";
  function onStreamToken(token, fullText) {
    streamedText = fullText;
    // Show first 200 chars of streamed response in the bubble
    const preview = fullText.length > 200
      ? fullText.slice(0, 200).replace(/\n/g,"<br/>") + "..."
      : fullText.replace(/\n/g,"<br/>");
    thinkEl.innerHTML =
      '<div style="color:#aaa;font-size:11px;white-space:pre-wrap;word-break:break-word;">' +
      escapeHtml(preview) +
      '</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px;">' +
      '<div class="dot"></div><div class="dot"></div><div class="dot"></div>' +
      ' <span id="elapsed" style="font-size:10px;color:#555;">' +
      (elapsedEl ? elapsedEl.textContent : "") + '</span></div>';
    thinkEl.scrollIntoView({behavior:"smooth"});
  }

  // Track whether this run is stale (a newer request superseded it).
  // Used in finally to suppress UI updates while still cleaning up DOM.
  let stale = false;
  try {
    const meta   = buildMeta();
    const prompt = buildPrompt(queryText, meta);
    let raw;

    // Use non-streamed call (streaming can be enabled when Langflow SSE is confirmed)
    raw = await callLangflow(prompt, activeController);

    // Discard stale responses
    if (genId !== requestGen) { stale = true; return; }

    let spec = parseSpec(raw);

    if (genId !== requestGen) { stale = true; return; }

    if (spec) {
      // JSON response — render chart/map/dashboard
      if (handleNonRenderableSpec(spec)) return;
      renderViz(spec);
      const summary = "Generated: <strong>" + spec.type + "</strong>" +
             (spec.title ? " — " + spec.title : "");
      addMsg("ai", summary);
    } else {
      // Plain text response — display directly
      const cleaned = String(raw || "").trim();
      addMsg("ai", escapeHtml(cleaned).replace(/\n/g,"<br/>"));
    }
  } catch(e) {
    if (genId !== requestGen) { stale = true; return; }
    if (e.name === "AbortError") {
      addMsg("sys", "Request cancelled — new query started.");
    } else {
      addMsg("error", "Error: " + e.message);
    }
  } finally {
    // Always clear timer and remove the thinking bubble — earlier the
    // early-return path on stale responses skipped thinkEl.remove(),
    // leaving orphan "thinking" bubbles forever when the user retyped fast.
    clearInterval(elapsedTimer);
    try { thinkEl.remove(); } catch{}
    if (!stale) {
      busy = false;
      document.getElementById("send-btn").disabled = false;
      activeController = null;
    }
  }
}

// =================================================================
//  RESPONSE PARSER — flexible
// =================================================================
function parseSpec(text) {
  if (!text) return null;

  // Pre-clean: strip markdown fences and leading/trailing junk
  let cleaned = text;
  // Extract content from ```json / ``` fences (including mismatched pairs)
  const fenceMatch = cleaned.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) cleaned = fenceMatch[1];
  // Remove leading text before the first { or [
  const firstBrace = Math.min(
    cleaned.indexOf('{') >= 0 ? cleaned.indexOf('{') : Infinity,
    cleaned.indexOf('[') >= 0 ? cleaned.indexOf('[') : Infinity
  );
  if (firstBrace < Infinity && firstBrace > 0) cleaned = cleaned.slice(firstBrace);
  // Remove trailing text after the last } or ]
  const lastBrace = Math.max(cleaned.lastIndexOf('}'), cleaned.lastIndexOf(']'));
  if (lastBrace >= 0 && lastBrace < cleaned.length - 1) cleaned = cleaned.slice(0, lastBrace + 1);

  function tryParse(str) {
    try { return JSON.parse(str); } catch {
      try {
        // Fix trailing commas and single quotes
        const fixed = str.replace(/,\s*([}\]])/g, '$1').replace(/'/g, '"');
        return JSON.parse(fixed);
      } catch { return null; }
    }
  }

  // 1. Try cleaned text directly
  const direct = tryParse(cleaned.trim());
  if (direct && direct.type) return direct;

  // 2. Try original fence extraction as fallback
  const m = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (m) {
    const j = tryParse(m[1].trim());
    if (j && j.type) return j;
  }
  // 2. Find balanced JSON object
  const start = text.indexOf('{');
  if (start !== -1) {
    let depth = 0, end = -1;
    for (let i = start; i < text.length; i++) {
      if (text[i] === '{') depth++;
      if (text[i] === '}') { depth--; if (depth === 0) { end = i; break; } }
    }
    if (end !== -1) {
      const j = tryParse(text.substring(start, end + 1));
      if (j && j.type) return j;
    }
  }
  // 3. Try whole text
  const j = tryParse(text.trim());
  if (j && j.type) return j;
  return null;
}

// =================================================================
//  FILTERS — universal where-clause for any panel
// =================================================================
// ── resolveColumn: multi-strategy column name matching ──
// Strategy order: 1 exact → 2 normalized → 3 word-subset → 4 substring
// Returns {name, strategy} on fuzzy match, undefined on no match.
function resolveColumn(colName, opts) {
  const quiet = opts?.quiet;
  if (!tableData || !colName) return undefined;
  // 1. Exact match
  if (tableData[colName] !== undefined) return colName;
  const norm = String(colName).toLowerCase().replace(/[_\s]/g, "");
  // 2. Normalized match (strip underscores/spaces, case-insensitive)
  for (const k of Object.keys(tableData)) {
    if (k.toLowerCase().replace(/[_\s]/g, "") === norm) { if(!quiet)sysMsg("🔧 Mapped \""+colName+"\" → \""+k+"\""); return k; }
  }
  // Split words BEFORE normalization so underscores/spaces act as word boundaries
  const words = String(colName).toLowerCase().split(/[\s_]+/).filter(w => w.length > 1);
  // 3. Word-subset match: user's words all appear in column name, or vice versa
  if (words.length >= 2) {
    let best=null, bestScore=0;
    for (const k of Object.keys(tableData)) {
      const kNorm = k.toLowerCase().replace(/[_\s]/g, "");
      const matchCount = words.filter(w => kNorm.includes(w)).length;
      if (matchCount === words.length && matchCount > bestScore) { best=k; bestScore=matchCount; }
    }
    // Also try the reverse: column words all appear in user's input
    if (!best) {
      for (const k of Object.keys(tableData)) {
        const kWords = k.toLowerCase().split(/[\s_]+/).filter(w => w.length > 1);
        const matchCount = kWords.filter(w => norm.includes(w)).length;
        if (matchCount === kWords.length && matchCount > bestScore) { best=k; bestScore=matchCount; }
      }
    }
    if (best) { if(!quiet)sysMsg("🔧 Matched \""+colName+"\" → \""+best+"\""); return best; }
  }
  // 4. Single-word substring fallback
  if (words.length === 1) {
    const w = words[0];
    for (const k of Object.keys(tableData)) {
      if (k.toLowerCase().replace(/[_\s]/g, "").includes(w)) { if(!quiet)sysMsg("🔧 Guessed \""+colName+"\" → \""+k+"\""); return k; }
    }
  }
  // 5. Levenshtein fallback — catch spelling errors (e.g. "Kesediaan" vs "Kesedian")
  let bestK=null, bestDist=Infinity;
  for (const k of Object.keys(tableData)) {
    const kNorm = k.toLowerCase().replace(/[_\s]/g, "");
    const dist = levenshtein(norm, kNorm);
    if (dist < bestDist) { bestDist = dist; bestK = k; }
  }
  // Accept if distance ≤ 2 or ≤ 20% of the longer string length
  const maxLen = Math.max(norm.length, (bestK||"").length);
  const threshold = Math.max(2, Math.floor(maxLen * 0.2));
  if (bestK && bestDist <= threshold && bestDist < norm.length) {
    if(!quiet)sysMsg("🔧 Fuzzy matched \""+colName+"\" → \""+bestK+"\" (edit distance="+bestDist+")");
    return bestK;
  }
  return undefined;
}

// Levenshtein (edit distance) — used by resolveColumn fuzzy fallback
function levenshtein(a, b) {
  const m=a.length, n=b.length;
  if (!m) return n; if (!n) return m;
  let prev=Array.from({length:n+1},(_,i)=>i), curr=new Array(n+1);
  for (let i=1;i<=m;i++) {
    curr[0]=i;
    for (let j=1;j<=n;j++) {
      curr[j]=a[i-1]===b[j-1] ? prev[j-1] : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
    }
    [prev,curr]=[curr,prev];
  }
  return prev[n];
}

function evalFilter(f, i) {
  const op = (f.op || "=").toLowerCase();
  if (op === "near") {
    if (!Array.isArray(f.value) || f.value.length < 3 || !f.lat_col || !f.lon_col) return true;
    const rLatCol = resolveColumn(f.lat_col);
    const rLonCol = resolveColumn(f.lon_col);
    if (!rLatCol || !rLonCol) return false;
    const tLat = +tableData[rLatCol][i], tLon = +tableData[rLonCol][i];
    if (isNaN(tLat) || isNaN(tLon)) return false;
    const r = 6371, dLat = (tLat - f.value[0]) * Math.PI / 180, dLon = (tLon - f.value[1]) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(f.value[0]*Math.PI/180) * Math.cos(tLat*Math.PI/180) * Math.sin(dLon/2)**2;
    return (r * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) <= f.value[2];
  }
  const rCol = resolveColumn(f.col);
  if (!rCol) return true;
  const col = tableData[rCol];
  const v = col[i];
  switch(op) {
    case "=": case "==": case "eq":  return String(v).toLowerCase() === String(f.value).toLowerCase();
    case "!=": case "<>": case "ne": return String(v).toLowerCase() !== String(f.value).toLowerCase();
    case "<":   return +v <  +f.value;
    case "<=":  return +v <= +f.value;
    case ">":   return +v >  +f.value;
    case ">=":  return +v >= +f.value;
    case "in":     return Array.isArray(f.value) && f.value.map(s => String(s).toLowerCase()).includes(String(v).toLowerCase());
    case "not_in": return Array.isArray(f.value) && !f.value.map(s => String(s).toLowerCase()).includes(String(v).toLowerCase());
    case "contains": return String(v ?? "").toLowerCase().includes(String(f.value).toLowerCase());
    case "is_empty":  return v === null || v === undefined || v === "";
    case "not_empty": return v !== null && v !== undefined && v !== "";
    case "before": { const a=parseAsDate(v), b=parseAsDate(f.value); return a&&b&&a<b; }
    case "after":  { const a=parseAsDate(v), b=parseAsDate(f.value); return a&&b&&a>b; }
    case "between": {
      if (!Array.isArray(f.value) || f.value.length!==2) return true;
      const d=parseAsDate(v); const lo=parseAsDate(f.value[0]); const hi=parseAsDate(f.value[1]);
      return d && lo && hi && d >= lo && d <= hi;
    }
    default: return true;
  }
}
function getFilteredIndices(filters) {
  if (!tableData) return [];
  const total = Object.values(tableData)[0]?.length ?? 0;
  if (!filters || !filters.length) return Array.from({length: total}, (_, i) => i);
  const out = [];
  for (let i = 0; i < total; i++) {
    if (filters.every(f => evalFilter(f, i))) out.push(i);
  }
  return out;
}

// =================================================================
//  DATE PARSING & BUCKETING
// =================================================================
// Iterative min/max — Math.min(...arr) / Math.max(...arr) overflow the
// argument stack when arr.length > ~65k (browser-dependent). For Grist
// tables with tens of thousands of rows, that wipes out the whole widget.
// Always use these instead of spread on potentially-large arrays.
function safeMin(arr) {
  if (!arr || !arr.length) return Infinity;
  let m = arr[0];
  for (let i = 1; i < arr.length; i++) if (arr[i] < m) m = arr[i];
  return m;
}
function safeMax(arr) {
  if (!arr || !arr.length) return -Infinity;
  let m = arr[0];
  for (let i = 1; i < arr.length; i++) if (arr[i] > m) m = arr[i];
  return m;
}

function parseAsDate(v) {
  if (v === null || v === undefined || v === "") return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  if (typeof v === "number") {
    const ms = v < 4e9 ? v * 1000 : v;
    const d = new Date(ms);
    return isNaN(d) ? null : d;
  }
  if (typeof v === "string") {
    const d = new Date(v);
    if (!isNaN(d)) return d;
    const m = v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) {
      const yr = m[3].length === 2 ? "20" + m[3] : m[3];
      const d2 = new Date(yr + "-" + m[2].padStart(2,"0") + "-" + m[1].padStart(2,"0"));
      return isNaN(d2) ? null : d2;
    }
    return null;
  }
  return null;
}
function bucketDate(d, bucket) {
  const y = d.getFullYear(), m = d.getMonth();
  switch((bucket||"month").toLowerCase()) {
    case "year":    return String(y);
    case "quarter": return y + "-Q" + (Math.floor(m/3) + 1);
    case "month":   return y + "-" + String(m+1).padStart(2,"0");
    case "week":    {
      const onejan = new Date(y, 0, 1);
      const wk = Math.ceil((((d - onejan)/86400000) + onejan.getDay() + 1)/7);
      return y + "-W" + String(wk).padStart(2,"0");
    }
    case "day": default: return d.toISOString().slice(0,10);
  }
}

// =================================================================
//  AGGREGATION  (filters + optional date bucket)
// =================================================================
function aggregate(xCol, yCol, agg, indices, dateBucket) {
  const rXCol = resolveColumn(xCol);
  const rYCol = resolveColumn(yCol);
  const xv = rXCol ? tableData[rXCol] : null;
  const yv = rYCol ? tableData[rYCol] : null;
  // Return diagnostic info when column not found
  const _diag = !rXCol && xCol ? `Column not found: ${xCol}` : null;
  if (!xv) return {labels:[], values:[], _diag};
  const idxList = indices || xv.map((_, i) => i);
  const g = {};
  for (const i of idxList) {
    let key;
    if (dateBucket) {
      const d = parseAsDate(xv[i]);
      if (!d) continue;
      key = bucketDate(d, dateBucket);
    } else {
      key = String(xv[i] ?? "(empty)");
    }
    const y = yv ? +yv[i] : 1;
    if (!g[key]) g[key] = [];
    g[key].push(isNaN(y) ? (yv ? 0 : 1) : y);
  }
  const entries = Object.entries(g).map(([k, arr]) => {
    let v;
    switch(agg) {
      case "sum": v = arr.reduce((a,b)=>a+b,0); break;
      case "avg": v = arr.reduce((a,b)=>a+b,0)/arr.length; break;
      case "max": v = safeMax(arr); break;
      case "min": v = safeMin(arr); break;
      case "median": {
        const sorted = arr.slice().sort((a,b)=>a-b);
        const mid = Math.floor(sorted.length/2);
        v = sorted.length % 2 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
        break;
      }
      case "stddev": {
        const mean = arr.reduce((a,b)=>a+b,0) / arr.length;
        v = Math.sqrt(arr.reduce((a,b)=>a + Math.pow(b-mean, 2), 0) / arr.length);
        break;
      }
      case "distinct_count": case "dc": v = new Set(arr).size; break;
      case "mode": {
        const freq = {}; arr.forEach(x => freq[x] = (freq[x]||0) + 1);
        v = +Object.entries(freq).sort((a,b) => b[1] - a[1])[0]?.[0] || 0;
        break;
      }
      case "p25": case "p75": case "p90": case "percentile": {
        const sorted = arr.slice().sort((a,b)=>a-b);
        let p = agg === "p25" ? 0.25 : agg === "p75" ? 0.75 : agg === "p90" ? 0.90 : 0.5;
        const idx = (sorted.length - 1) * p;
        const lo = Math.floor(idx), hi = Math.ceil(idx);
        v = lo === hi ? sorted[lo] : sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
        break;
      }
      default:    v = arr.length;
    }
    return {x:k, y:+v.toFixed(4)};
  });
  if (dateBucket) entries.sort((a,b) => a.x.localeCompare(b.x));
  else            entries.sort((a,b) => b.y - a.y);
  return {labels:entries.map(e=>e.x), values:entries.map(e=>e.y), _diag:null};
}

// Reference lines / annotations helper — returns {shapes, annotations} to merge into layout
function buildReferenceLines(spec) {
  const shapes = [], annotations = [];
  const addLine = (axis, val, opt) => {
    const isX = axis === "x";
    shapes.push({
      type: "line", line: { color: opt.color || "#ffd166", width: opt.width || 1.5, dash: opt.dash || "dash" },
      x0: isX ? val : 0, x1: isX ? val : 1, y0: isX ? 0 : val, y1: isX ? 1 : val,
      xref: isX ? "x" : "paper", yref: isX ? "paper" : "y",
    });
    if (opt.label) {
      annotations.push({
        x: isX ? val : (opt.label_x || 1.02), y: isX ? (opt.label_y || 1.02) : val,
        xref: isX ? "x" : "paper", yref: isX ? "paper" : "y",
        text: opt.label, showarrow: false,
        font: { color: opt.color || "#ffd166", size: 10 },
        xanchor: isX ? "center" : "left", yanchor: isX ? "bottom" : "middle",
      });
    }
  };
  if (Array.isArray(spec.hlines)) spec.hlines.forEach(h => addLine("y", h.value, h));
  if (Array.isArray(spec.vlines)) spec.vlines.forEach(v => addLine("x", v.value, v));
  return { shapes, annotations };
}

// Data export — CSV / JSON
function exportCSV() {
  if (!tableData) { addMsg("error","No data to export."); return; }
  // Export all columns (previously silently truncated to first 20, which
  // produced an incomplete CSV with no warning to the user).
  const cols = Object.keys(tableData).filter(c => c !== "manualSort" && !c.startsWith("gristHelper"));
  const rows = Object.values(tableData)[0]?.length ?? 0;
  let csv = cols.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(",") + "\n";
  for (let i = 0; i < rows; i++) {
    csv += cols.map(c => {
      const v = tableData[c]?.[i];
      return v == null ? "" : '"' + String(v).replace(/"/g,'""') + '"';
    }).join(",") + "\n";
  }
  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = (tableName || "export") + ".csv"; a.click(); URL.revokeObjectURL(a.href);
  sysMsg("Exported " + rows.toLocaleString() + " rows x " + cols.length + " cols as CSV.");
}
function exportJSON() {
  if (!tableData) { addMsg("error","No data to export."); return; }
  const cols = Object.keys(tableData).filter(c => c !== "manualSort" && !c.startsWith("gristHelper"));
  const rows = Object.values(tableData)[0]?.length ?? 0;
  const arr = [];
  for (let i = 0; i < rows; i++) {
    const row = {}; cols.forEach(c => row[c] = tableData[c]?.[i]); arr.push(row);
  }
  const blob = new Blob([JSON.stringify(arr, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = (tableName || "export") + ".json"; a.click(); URL.revokeObjectURL(a.href);
  sysMsg("Exported " + rows.toLocaleString() + " rows as JSON.");
}

}

// Manual panel insertion into the active dashboard
function addDashboardPanel() {
  if (!lastDashSpec || !tableData) { sysMsg("No active dashboard."); return; }
  const allCols = Object.keys(tableData).filter(c => !c.startsWith("gristHelper"));
  const geoCols = allCols.filter(c => /lat|lon|latitude|longitude/i.test(c));
  const numCols = allCols.filter(c => {
    const vals = tableData[c] || [];
    const numRatio = vals.filter(v => typeof v === "number" || (!isNaN(+v) && v !== "")).length / Math.max(1, vals.length);
    return numRatio > 0.7;
  });
  const textCols = allCols.filter(c => !numCols.includes(c) && !geoCols.includes(c));

  const type = prompt("Panel type (bar, line, pie, stat, table, map, heatmap, audit):", "bar");
  if (!type) return;

  let panel = { type };

  function validCol(c) {
    if (!c) return true; // optional
    const ok = allCols.includes(c);
    if (!ok) sysMsg("⚠ Column not found: " + c + ". Available: " + allCols.slice(0,10).join(", "));
    return ok;
  }

  switch(type) {
    case "stat":
      panel.col = prompt("Column:", numCols[0] || allCols[0]);
      if (!validCol(panel.col)) return;
      panel.agg = prompt("Agg (count, sum, avg, max, min, distinct_count):", "count");
      panel.title = prompt("Title:", panel.agg + " of " + panel.col);
      break;
    case "bar": case "line":
      panel.x_col = prompt("X column:", textCols[0] || allCols[0]);
      if (!validCol(panel.x_col)) return;
      panel.y_col = prompt("Y column (optional):", numCols[0] || "");
      if (!panel.y_col) panel.y_col = null;
      else if (!validCol(panel.y_col)) return;
      panel.agg = prompt("Agg (count, sum, avg, max, min):", "count");
      panel.title = prompt("Title:", panel.agg + " of " + (panel.y_col || "rows") + " by " + panel.x_col);
      break;
    case "pie":
      panel.names_col = prompt("Names column:", textCols[0] || allCols[0]);
      if (!validCol(panel.names_col)) return;
      panel.title = prompt("Title:", "Distribution of " + panel.names_col);
      break;
    case "table":
      panel.columns = (prompt("Columns (comma-separated):", allCols.slice(0,4).join(",")) || "").split(",").map(s => s.trim()).filter(Boolean);
      panel.title = prompt("Title:", "Table");
      break;
    case "map": case "heatmap":
      panel.lat_col = prompt("Latitude column:", geoCols.find(c => /lat/i.test(c)) || geoCols[0] || "");
      if (!validCol(panel.lat_col)) return;
      panel.lon_col = prompt("Longitude column:", geoCols.find(c => /lon/i.test(c) || /lng/i.test(c)) || geoCols[1] || "");
      if (!validCol(panel.lon_col)) return;
      panel.title = prompt("Title:", "Map");
      break;
    case "audit":
      panel.title = prompt("Title:", "Data Quality Audit");
      break;
    default:
      sysMsg("Unknown panel type: " + type); return;
  }

  lastDashSpec.panels = [...(lastDashSpec.panels || []), panel];
  renderViz({ type: "dashboard", title: lastDashSpec.title, panels: lastDashSpec.panels });
  sysMsg("Added " + type + " panel.");
}
