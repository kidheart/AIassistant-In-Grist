function pushVizHistory(spec) {
  // Don't push duplicates of the last entry
  if (vizHistoryIdx >= 0 && vizHistoryIdx < vizHistory.length) {
    const last = vizHistory[vizHistoryIdx];
    if (last.type === spec.type && last.title === spec.title) return;
  }
  vizHistory = vizHistory.slice(0, vizHistoryIdx + 1);
  vizHistory.push({ type: spec.type, spec: spec, title: spec.title, table: tableName });
  vizHistoryIdx = vizHistory.length - 1;
  if (vizHistory.length > 50) { vizHistory.shift(); vizHistoryIdx--; }
}
function undoViz() {
  if (vizHistoryIdx <= 0) { sysMsg("Nothing to undo."); return; }
  vizHistoryIdx--;
  const entry = vizHistory[vizHistoryIdx];
  sysMsg("↩ Undo: " + (entry.title || entry.type));
  renderViz(entry.spec);
}
function redoViz() {
  if (vizHistoryIdx >= vizHistory.length - 1) { sysMsg("Nothing to redo."); return; }
  vizHistoryIdx++;
  const entry = vizHistory[vizHistoryIdx];
  sysMsg("↪ Redo: " + (entry.title || entry.type));
  renderViz(entry.spec);
}
// Keyboard shortcuts
document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) { e.preventDefault(); undoViz(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.key === "z" && e.shiftKey))) { e.preventDefault(); redoViz(); }
});

function renderViz(rawSpec) {
  const spec = preprocessSpec(rawSpec);
  // Apply active filter chips to the spec (if any)
  if (_activeFilters.length && spec.type !== "clarify" && spec.type !== "error") {
    const resolved = _activeFilters.map(f => {
      if (f.col === "*" && tableData) {
        // Auto-detect best column for wildcard filter
        for (const [col, vals] of Object.entries(tableData)) {
          const clean = vals.filter(v => v != null && v !== "");
          const match = clean.some(v => String(v).toLowerCase().includes(f.value.toLowerCase()));
          if (match) return { ...f, col };
        }
      }
      return f;
    }).filter(f => f.col !== "*");
    if (resolved.length) {
      if (spec.type === "dashboard") {
        spec.panels = spec.panels.map(p => ({ ...p, filters: [...resolved, ...(p.filters || [])] }));
      } else {
        spec.filters = [...resolved, ...(spec.filters || [])];
      }
    }
  }
  // Dashboard spec doesn't participate in single-chart context inheritance
  lastSpec = (spec.type === "dashboard") ? null : spec;
  pushVizHistory(spec);
  setVizTitle((spec.title || spec.type) + "  [" + (tableName||"") + "]");
  updateToolbarButtons(spec.type);
  switch(spec.type) {
    case "bar":     renderBar(spec);     break;
    case "line":    renderLine(spec);    break;
    case "pie":     renderPie(spec);     break;
    case "scatter": renderScatter(spec); break;
    case "map":       renderMap(spec);       break;
    case "shift_map": renderShiftMap(spec);  break;
    case "dashboard": renderDashboard(spec); break;
    case "audit":     renderAuditFull(spec); break;
    case "ratio_bar": renderRatioBar(spec);  break;
    case "stat":      renderStat(spec);      break;
    case "table":     renderTable(spec);     break;
    case "action":    executeAction(spec);   break;
    case "histogram": renderHistogram(spec); break;
    case "box":       renderBox(spec);       break;
    case "heatmap":   renderHeatmap(spec);   break;
    case "area":      renderArea(spec);      break;
    case "choropleth": renderChoropleth(spec); break;
    default: vizError("Unknown chart type: " + spec.type);
  }
}

// =================================================================
//  DATA MODIFICATION ACTION
// =================================================================
async function executeAction(spec) {
  if (spec.action_type !== "update" || !spec.updates) return addMsg("error", "Unsupported action");
  const indices = getFilteredIndices(spec.filters);
  if (!indices.length) { addMsg("sys", "No records matched the filters to update."); return; }
  if (!tableData.id) { addMsg("error", "Row IDs missing. Cannot update."); return; }

  // Preview before applying
  const updates = spec.updates;
  const previewCols = Object.keys(updates);
  const sampleCount = Math.min(3, indices.length);
  let preview = `🖊 <b>Update ${indices.length} record(s)</b><br/>`;
  preview += `Fields: ${previewCols.map(c => `<b>${escapeHtml(c)}</b> → ${escapeHtml(String(updates[c]))}`).join(", ")}<br/>`;
  preview += `Sample rows: `;
  for (let si = 0; si < sampleCount; si++) {
    const i = indices[si];
    const old = previewCols.map(c => `${c}=${escapeHtml(String(tableData[c]?.[i] ?? "—"))}`).join(", ");
    preview += `<br/>&nbsp;&nbsp;#${si+1}: ${old}`;
  }
  addMsg("ai", preview);
  
  const confirmed = confirm(`Update ${indices.length} record(s)?\n\nChanges: ${JSON.stringify(updates, null, 2)}\n\nThis action cannot be undone. Proceed?`);
  if (!confirmed) { addMsg("sys", "Update cancelled."); return; }
  
  const ids = indices.map(i => tableData.id[i]);
  const actions = ids.map(id => ["UpdateRecord", tableName, id, updates]);
  
  try {
    addMsg("sys", `Applying update to ${ids.length} rows...`);
    await grist.docApi.applyUserActions(actions);
    addMsg("ai", `Successfully updated ${ids.length} records! 🎉`);
    await loadTable(tableName); // Refresh table state
  } catch(e) {
    addMsg("error", "Failed to update: " + e.message);
  }
}

// =================================================================
//  STANDALONE STAT
// =================================================================
function renderStat(spec) {
  showPlotly(); // Use plotly div to center content
  const div = document.getElementById("plotly-div");
  
  let v = computeStat(spec);
  // Percent format: auto-calculate ratio = filtered / total * 100
  if (spec.format === "percent" && (spec.filters?.length || spec.filter_col)) {
    const total = Object.values(tableData)[0]?.length ?? 0;
    v = total > 0 ? (v / total * 100) : 0;
  }
  const formatted = fmtStat(v, spec.format);
  
  div.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;">
      <div style="font-size:18px;color:#90d0e8;margin-bottom:12px;font-weight:600;">${escapeHtml(spec.title || "Statistic")}</div>
      <div style="font-size:64px;font-weight:700;color:#fff;text-shadow:0 0 20px rgba(144,208,232,0.3);line-height:1;">${escapeHtml(formatted)}</div>
      ${spec.sub ? `<div style="font-size:14px;color:#888;margin-top:16px;">${escapeHtml(spec.sub)}</div>` : ""}
    </div>
  `;
}

// =================================================================
//  AUDIT — data quality checks
// =================================================================
function runAuditChecks(spec) {
  const checks = [];
  if (!tableData) return checks;
  const totalRows = Object.values(tableData)[0]?.length ?? 0;
  const requested = spec?.checks; // null = all

  const want = name => !requested || requested.includes(name);

  // Total rows
  checks.push({ status:"info", icon:"📊", label:"Total rows", detail:totalRows.toLocaleString() });

  // Missing values per column
  if (want("missing")) {
    let anyMissing = false;
    for (const [col, vals] of Object.entries(tableData)) {
      const missing = vals.filter(v => v === null || v === undefined || v === "").length;
      if (missing > 0) {
        anyMissing = true;
        const pct = (missing / totalRows * 100);
        checks.push({
          status: pct > 10 ? "warn" : "ok",
          icon: pct > 10 ? "⚠️" : "•",
          label: col,
          detail: missing.toLocaleString() + " missing (" + pct.toFixed(1) + "%)"
        });
      }
    }
    if (!anyMissing) checks.push({ status:"ok", icon:"✅", label:"Missing values", detail:"None — all columns complete" });
  }

  // Coordinate validity
  if (want("geo")) {
    const latCol = Object.keys(tableData).find(c => /^lat(itude)?$/i.test(c));
    const lonCol = Object.keys(tableData).find(c => /^lon(gitude|g)?$/i.test(c));
    if (latCol && lonCol) {
      let invalid=0, zero=0, ok=0;
      for (let i=0; i<totalRows; i++) {
        const la = +tableData[latCol][i], lo = +tableData[lonCol][i];
        if (la === 0 && lo === 0) zero++;
        else if (isNaN(la)||isNaN(lo)||la<-90||la>90||lo<-180||lo>180) invalid++;
        else ok++;
      }
      checks.push({ status:"info", icon:"🌐", label:"Valid coordinates", detail:ok.toLocaleString() + "/" + totalRows.toLocaleString() });
      if (zero > 0)    checks.push({ status:"warn",  icon:"⚠️", label:"(0,0) placeholders", detail:zero.toLocaleString() + " rows" });
      if (invalid > 0) checks.push({ status:"error", icon:"❌", label:"Invalid coordinates", detail:invalid.toLocaleString() + " rows out of range" });
    }
  }

  // Date validity
  if (want("dates")) {
    const dateCols = Object.entries(tableData).filter(([n]) => /date|tarikh|tanggal|time/i.test(n));
    dateCols.forEach(([name, vals]) => {
      let parseable=0, unparseable=0, future=0;
      const now = Date.now();
      vals.forEach(v => {
        if (v === null || v === undefined || v === "") return;
        const d = parseAsDate(v);
        if (!d) unparseable++;
        else { parseable++; if (d.getTime() > now) future++; }
      });
      if (unparseable > 0) checks.push({ status:"warn", icon:"⚠️", label:name + " — unparseable", detail:unparseable + " rows" });
      if (future > 0)      checks.push({ status:"info", icon:"📅", label:name + " — future dates", detail:future + " rows" });
    });
  }

  // Duplicate rows
  if (want("duplicates")) {
    const seen = new Set();
    let dupes = 0;
    for (let i=0; i<totalRows; i++) {
      const key = Object.values(tableData).map(v => String(v[i] ?? "")).join("|");
      if (seen.has(key)) dupes++; else seen.add(key);
    }
    if (dupes > 0) checks.push({ status:"warn", icon:"⚠️", label:"Duplicate rows", detail:dupes.toLocaleString() });
    else           checks.push({ status:"ok",   icon:"✅", label:"Duplicate rows", detail:"None" });
  }

  return checks;
}

function renderAuditList(target, checks) {
  target.style.cssText = "overflow-y:auto;padding:10px 12px;background:#13131f;";
  target.innerHTML = "";
  checks.forEach(c => {
    const color = c.status === "error" ? "#ef476f"
                : c.status === "warn"  ? "#ffd166"
                : c.status === "ok"    ? "#06d6a0"
                : "#90d0e8";
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:9px;padding:6px 4px;border-bottom:1px solid #1e1e35;font-size:11px;";
    row.innerHTML = `
      <span style="font-size:13px;width:18px;text-align:center;">${c.icon}</span>
      <span style="flex:1;color:${color};font-weight:500;">${escapeHtml(c.label)}</span>
      <span style="color:#888;font-variant-numeric:tabular-nums;">${escapeHtml(c.detail)}</span>`;
    target.appendChild(row);
  });
}

function dashRenderAudit(divId, s) {
  const target = document.getElementById(divId);
  renderAuditList(target, runAuditChecks(s));
}

// =================================================================
//  RATIO BAR — single horizontal stacked bar showing % composition
// =================================================================
function ratioBarTraces(s) {
  const idx = getFilteredIndices(s.filters);
  const { labels, values } = aggregate(s.names_col, null, "count", idx);
  if (!labels.length) return null;
  const total = values.reduce((a,b) => a+b, 0);
  const yLabel = "";
  // Use distinct contrasting colors for 2-category case
  const colors2 = ["#00b4d8", "#ef476f", "#06d6a0", "#ffd166", "#48cae4", "#ff6b6b"];
  return labels.map((label, i) => {
    const cnt = values[i];
    const pct = (cnt / total * 100).toFixed(1);
    return {
      type: "bar", orientation: "h",
      y: [yLabel],
      x: [cnt],
      width: [0.6],
      name: `${label}: ${cnt} (${pct}%)`,
      marker: { color: colors2[i % colors2.length] },
      text: `${label}  ·  ${cnt}  (${pct}%)`,
      textposition: "inside",
      insidetextanchor: "middle",
      textfont: { color: "#fff", size: 14, family: "-apple-system, 'Segoe UI', sans-serif" },
      hovertemplate: `<b>${label}</b><br>Count: %{x}<br>Percentage: ${pct}%<extra></extra>`,
    };
  });
}
function ratioBarLayout(s, dashMode) {
  return {
    ...currentLayout(),
    barmode: "stack",
    showlegend: true,
    legend: { orientation: "h", x: 0.5, xanchor: "center",
              y: dashMode ? -0.35 : -0.25,
              font: {size: 12, color:"#c0c0d0"}, bgcolor: "transparent" },
    title: dashMode ? null : { text: s.title || "", font: {color:"#c0c0d0",size:14} },
    margin: dashMode ? {t:8,b:50,l:8,r:8} : {t:50,b:70,l:10,r:10},
    height: dashMode ? 140 : undefined,
    xaxis: { showgrid:false, zeroline:false, showticklabels:false, fixedrange:true },
    yaxis: { showgrid:false, zeroline:false, showticklabels:false, fixedrange:true },
    bargap: 0.3,
  };
}
function renderRatioBar(s) {
  showPlotly();
  const resolved = resolveColumn(s.names_col);
  if (!resolved) { vizError("Column not found: " + (s.names_col||"?")); return; }
  const traces = ratioBarTraces(s);
  if (!traces) {
    const vals = [...new Set((tableData[resolved]||[]).filter(v=>v!=null&&v!=="").slice(0,10))];
    vizError("No data in " + resolved + ". Sample values: " + JSON.stringify(vals));
    return;
  }
  Plotly.react("plotly-div", traces, ratioBarLayout(s, false), {responsive:true, displayModeBar:true, displaylogo:false});
}
function dashRenderRatioBar(divId, s) {
  const resolved = resolveColumn(s.names_col);
  if (!resolved) {
    const allCols = tableData ? Object.keys(tableData).join(", ") : "(no table loaded)";
    document.getElementById(divId).innerHTML =
      '<div style="color:#cc6666;padding:14px;font-size:11px">Column not found: <b>' + escapeHtml(s.names_col||"?") + '</b><br><span style="font-size:10px;color:#888">Available: ' + escapeHtml(allCols) + '</span></div>';
    return;
  }
  const traces = ratioBarTraces(s);

      '<div style="color:#cc6666;padding:14px;font-size:11px">No data in <b>' + escapeHtml(resolved) + '</b><br><span style="font-size:10px;color:#888">Sample values: ' + JSON.stringify(vals) + '</span></div>';

// =================================================================
//  DASHBOARD RENDERER
// =================================================================
function renderDashboard(spec) {
  // Honour the LLM's panel count exactly — no forced enrichment.
  // If the user wanted more panels, they'll ask.
  const panels = (spec.panels || []).slice(0, 9);
  if (!panels.length) { vizError("Dashboard has no panels."); return; }

  showDashboard();
  lastDashSpec = { ...spec, panels };

  const grid = document.getElementById("dashboard-grid");
  grid.innerHTML = "";

  // Generation timestamp banner — spans full width at top
  const tsBanner = document.createElement("div");
  tsBanner.style.cssText = "grid-column:span 12;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#1a1a2e;border:1px solid #0f3460;border-radius:5px;font-size:11px;";
  const genTime = new Date().toLocaleString("en-GB", {hour12:false});
  tsBanner.innerHTML =
    `<span style="color:#c0c0d0;font-weight:600">${escapeHtml(spec.title || "Dashboard")}</span>
     <span style="color:#666">Generated: <span style="color:#90d0e8;font-variant-numeric:tabular-nums">${genTime}</span></span>`;
  grid.appendChild(tsBanner);

  panels.forEach((p, i) => {
    const isMap  = p.type === "map" || p.type === "shift_map";
    const isStat = p.type === "stat";
    const isWide = p.type === "ratio_bar" || p.type === "audit";
    const panel = document.createElement("div");
    panel.className = "dash-panel" + (isMap ? " full-row" : "") + (isStat ? " stat" : "") + (isWide ? " wide-row" : "");
    panel.id = "dash-panel-" + i;
    panel.innerHTML = `
      <div class="dash-panel-header">
        <span class="dash-panel-title">${escapeHtml(p.title || p.type)}</span>
        <div class="dash-panel-actions">
          <button title="Refresh"  data-act="refresh">🔄</button>
          <button title="Expand"   data-act="expand">⤢</button>
          <button title="Remove"   data-act="remove">✕</button>
        </div>
      </div>
      <div class="dash-panel-body" id="dash-body-${i}"></div>`;
    grid.appendChild(panel);

    // Bind controls
    panel.querySelector('[data-act="refresh"]').onclick = () => {
      panel.querySelector(".dash-panel-body").innerHTML = "";
      renderPanel(p, "dash-body-" + i);
    };
    panel.querySelector('[data-act="expand"]').onclick = () => { renderViz(p); };
    if (isStat) panel.querySelector('[data-act="expand"]').style.display = "none";
    panel.querySelector('[data-act="remove"]').onclick = () => {
      // Capture the body div BEFORE removing the panel — otherwise the map
      // cleanup below silently no-ops (the body div lives inside the panel
      // we're about to detach, so getElementById would return null after).
      const bodyDiv = document.getElementById("dash-body-" + i);
      lastDashSpec.panels = lastDashSpec.panels.filter((_, idx) => idx !== i);
      panel.remove();
      // dashboardMaps cleanup of this panel's map
      dashboardMaps = dashboardMaps.filter(m => {
        if (bodyDiv && bodyDiv.contains(m.getContainer && m.getContainer())) {
          try { m.remove(); } catch{}
          return false;
        }
        return true;
      });
    };

    // Render the actual chart/map into body
    renderPanel(p, "dash-body-" + i);
  });

  // After Plotly + Leaflet render in hidden grid, must re-trigger size
  setTimeout(() => {
    dashboardMaps.forEach(m => { try { m.invalidateSize(); } catch{} });
    document.querySelectorAll('#dashboard-grid .js-plotly-plot').forEach(el => {
      try { Plotly.Plots.resize(el); } catch{}
    });
    // Attach click-to-filter handlers (once per plot div)
    document.querySelectorAll('#dashboard-grid .js-plotly-plot').forEach(el => {
      if (el._dashClickBound) return;
      el._dashClickBound = true;
      el.on('plotly_click', function(data) {
        if (!data.points || !data.points.length) return;
        const pt = data.points[0];
        const category = pt.x !== undefined ? String(pt.x) : (pt.label !== undefined ? String(pt.label) : null);
        if (!category) return;
        const panelDiv = el.closest('.dash-panel');
        const panelIdx = panelDiv ? parseInt(panelDiv.id.replace('dash-panel-', '')) : -1;
        if (panelIdx < 0 || !lastDashSpec) return;
        const panel = lastDashSpec.panels[panelIdx];
        if (!panel) return;
        const col = panel.x_col || panel.names_col;
        if (!col) return;
        // Toggle: clicking same category clears the filter
        if (_dashCrossFilter && _dashCrossFilter.col === col && _dashCrossFilter.value === category) {
          _dashCrossFilter = null;
          sysMsg("🔓 Cross-filter cleared.");
        } else {
          _dashCrossFilter = { col, op: "=", value: category };
          sysMsg("🔍 Cross-filter: " + col + " = \"" + category + "\"  (click again to clear)");
        }
        // Re-render dashboard, prepending cross-filter to each panel
        const newPanels = lastDashSpec.panels.map(p => ({
          ...p,
          filters: _dashCrossFilter
            ? [_dashCrossFilter, ...(p.filters || [])]
            : (p.filters || []).filter(f => !(f.col === col && f.op === "=" && f.value === category))
        }));
        renderViz({ type: "dashboard", title: lastDashSpec.title, panels: newPanels });
      });
    });
  }, 60);
}

// Dispatch a single panel to the right mini-renderer
function renderPanel(p, divId) {
  switch(p.type) {
    case "stat":      dashRenderStat(divId, p);      break;
    case "bar":       dashRenderBar(divId, p);       break;
    case "line":      dashRenderLine(divId, p);      break;
    case "pie":       dashRenderPie(divId, p);       break;
    case "scatter":   dashRenderScatter(divId, p);   break;
    case "map":       dashRenderMap(divId, p);       break;
    case "shift_map": dashRenderShiftMap(divId, p);  break;
    case "heatmap":   dashRenderHeatmap(divId, p);   break;
    case "area":      dashRenderArea(divId, p);      break;
    case "audit":     dashRenderAudit(divId, p);     break;
    case "ratio_bar": dashRenderRatioBar(divId, p);  break;
    case "table":     dashRenderTable(divId, p);     break;
    default:
      document.getElementById(divId).innerHTML =
        '<div style="color:#666;padding:14px;font-size:11px">Unsupported panel type: ' + p.type + '</div>';
  }
}

// =================================================================
//  STAT COMPUTATION + FORMATTING
// =================================================================
function computeStat(s) {
  if (!tableData) return null;

  // Build filtered index list — prefer new filters[] array, fall back to legacy filter_col/value
  let indices;
  if (s.filters && s.filters.length) {
    indices = getFilteredIndices(s.filters);
  } else if (s.filter_col && tableData[s.filter_col] && s.filter_value !== undefined && s.filter_value !== null && s.filter_value !== "") {
    const fc = tableData[s.filter_col];
    indices = [];
    for (let i = 0; i < fc.length; i++) {
      if (String(fc[i]) === String(s.filter_value)) indices.push(i);
    }
  } else {
    indices = getFilteredIndices(null);
  }

  // No col → return count of indices (filtered or total rows)
  if (!s.col) return indices.length;

  const colData = tableData[s.col];
  if (!colData) return null;

  // count agg → count non-empty
  if (s.agg === "count") {
    return indices.filter(i => colData[i] !== null && colData[i] !== undefined && colData[i] !== "").length;
  }

  // numeric aggs
  const nums = indices.map(i => +colData[i]).filter(n => !isNaN(n));
  if (!nums.length) return 0;
  switch(s.agg) {
    case "sum": return nums.reduce((a,b)=>a+b, 0);
    case "avg": return nums.reduce((a,b)=>a+b, 0) / nums.length;
    case "max": return safeMax(nums);
    case "min": return safeMin(nums);
    case "median": {
      const sorted = nums.slice().sort((a,b)=>a-b);
      const mid = Math.floor(sorted.length/2);
      return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
    }
    case "stddev": {
      const mean = nums.reduce((a,b)=>a+b, 0) / nums.length;
      return Math.sqrt(nums.reduce((a,b)=>a + Math.pow(b-mean, 2), 0) / nums.length);
    }
    case "distinct_count": case "dc": return new Set(indices.map(i => colData[i])).size;
    case "mode": {
      const freq = {}; indices.forEach(i => { const v = colData[i]; if (v != null && v !== "") freq[v] = (freq[v]||0) + 1; });
      return +Object.entries(freq).sort((a,b) => b[1] - a[1])[0]?.[0] || 0;
    }
    case "p25": case "p75": case "p90": case "percentile": {
      const sorted = nums.slice().sort((a,b)=>a-b);
      let p = s.agg === "p25" ? 0.25 : s.agg === "p75" ? 0.75 : s.agg === "p90" ? 0.90 : 0.5;
      const idx = (sorted.length - 1) * p;
      const lo = Math.floor(idx), hi = Math.ceil(idx);
      return lo === hi ? sorted[lo] : sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
    }
    default:    return nums.length;
  }
}

function fmtStat(v, format) {
  if (v === null || v === undefined) return "—";
  if (typeof v !== "number" || isNaN(v)) return String(v);
  switch(format) {
    case "percent":    return v.toFixed(1) + "%";
    case "currency":   return "RM " + Math.round(v).toLocaleString();
    case "metres":     return v >= 1000 ? (v/1000).toFixed(2) + " km" : Math.round(v).toLocaleString() + " m";
    case "kilometres": return v.toFixed(2) + " km";
    case "decimal":    return v.toFixed(2);
    default:
      if (Number.isInteger(v))         return v.toLocaleString();
      if (Math.abs(v) >= 1000)         return Math.round(v).toLocaleString();
      return v.toFixed(2);
  }
}

function dashRenderStat(divId, s) {
  const target = document.getElementById(divId);
  target.classList.add("stat-body");
  let v = computeStat(s);
  // Percent format: auto-calculate ratio = filtered / total * 100
  if (s.format === "percent" && (s.filters?.length || s.filter_col)) {
    const total = Object.values(tableData)[0]?.length ?? 0;
    v = total > 0 ? (v / total * 100) : 0;
  }
  const formatted = fmtStat(v, s.format);
  target.innerHTML = `
    <div class="stat-value">${escapeHtml(formatted)}</div>
    ${s.sub ? `<div class="stat-sub">${escapeHtml(s.sub)}</div>` : ""}
  `;
}

  Plotly.react(divId, [{
    type:"pie", labels:fL, values:fV, hole:0.4,
    marker:{colors:PALETTE},

function dashRenderMap(divId, s) {
  const target = document.getElementById(divId);
  target.innerHTML = "";
  const rLat = resolveColumn(s.lat_col);
  const rLon = resolveColumn(s.lon_col);
  const latv = rLat ? (tableData[rLat]||[]).map(Number) : [];
  const lonv = rLon ? (tableData[rLon]||[]).map(Number) : [];
  if (!latv.length) { target.innerHTML = '<div style="color:#666;padding:14px">No coords</div>'; return; }

  const fixedRadius = normalizeRadius(s.radius);
  const rRad = resolveColumn(s.radius_col);
  const rCol = resolveColumn(s.color_col);
  const radCol = (!fixedRadius && rRad && tableData[rRad]) ? tableData[rRad].map(Number) : null;
  const colv   = rCol && tableData[rCol] ? tableData[rCol] : null;

  const filtIdx = getFilteredIndices(s.filters);
  const ptsRaw = [];
  for (const i of filtIdx) {
    const la=latv[i], lo=lonv[i];
    if (!isNaN(la)&&!isNaN(lo)&&la>=-90&&la<=90&&lo>=-180&&lo<=180&&!(la===0&&lo===0)) {
      let rad = fixedRadius;
      if (!rad && radCol) { const rv=radCol[i]; rad = (!isNaN(rv)&&rv>0)?rv:null; }
      ptsRaw.push({la, lo, rad, cat:colv?colv[i]:null, idx:i});
    }
  }
  const { kept: pts } = filterOutliers(ptsRaw, { bounds: s.bounds });
  if (!pts.length) { target.innerHTML = '<div style="color:#666;padding:14px">No valid coords</div>'; return; }

  const sample = pts.length > 3000 ? pts.slice(0,3000) : pts;
  const cats = colv ? [...new Set(pts.map(p=>p.cat))] : [];
  const catColor = {};
  cats.forEach((c,i) => catColor[c] = PALETTE[i%PALETTE.length]);

  const map = L.map(divId, {preferCanvas:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"© OSM", maxZoom:19,
  }).addTo(map);
  dashboardMaps.push(map);

  const hasRadius = sample.some(p => p.rad !== null && p.rad !== undefined);
  const dashCluster = !hasRadius && sample.length > 500 && typeof L.markerClusterGroup === "function"
    ? L.markerClusterGroup({ maxClusterRadius: 40, disableClusteringAtZoom: 15 }) : null;
  if (dashCluster) dashCluster.addTo(map);

  sample.forEach(p => {
    const color = colv ? (catColor[p.cat]||"#00b4d8") : "#00b4d8";
    if (p.rad !== null && p.rad !== undefined) {
      const circle = L.circle([p.la,p.lo], {radius:p.rad, fillColor:color, color:color, fillOpacity:0.2, weight:1, opacity:0.7});
      circle.bindPopup(buildPopup(p.idx, s), {maxWidth:240});
      circle.addTo(map);
    } else {
      const layer = L.circleMarker([p.la,p.lo], {radius:4, fillColor:color, color:"rgba(0,0,0,0.3)", fillOpacity:0.85, weight:0.5});
      layer.bindPopup(buildPopup(p.idx, s), {maxWidth:240});
      dashCluster ? dashCluster.addLayer(layer) : layer.addTo(map);
    }
  });
  map.fitBounds(L.latLngBounds(sample.map(p=>[p.la,p.lo])), {padding:[14,14]});
}

function dashRenderShiftMap(divId, s) {
  s = autoCorrectShiftMap(s);  // fix LLM column name errors
  const target = document.getElementById(divId);
  target.innerHTML = "";
  const rLatOld = resolveColumn(s.lat_old);
  const rLonOld = resolveColumn(s.lon_old);
  const rLatNew = resolveColumn(s.lat_new);
  const rLonNew = resolveColumn(s.lon_new);
  const latOld = rLatOld ? (tableData[rLatOld]||[]).map(Number) : [];
  const lonOld = rLonOld ? (tableData[rLonOld]||[]).map(Number) : [];
  const latNew = rLatNew ? (tableData[rLatNew]||[]).map(Number) : [];
  const lonNew = rLonNew ? (tableData[rLonNew]||[]).map(Number) : [];
  const rLabel = resolveColumn(s.label_col);
  const labelV = rLabel && tableData[rLabel] ? tableData[rLabel] : null;
  if (!latOld.length) { target.innerHTML = '<div style="color:#666;padding:14px">Cols not found</div>'; return; }

  const filtIdx = getFilteredIndices(s.filters);
  const pairs = [];
  for (const i of filtIdx) {
    const la1=latOld[i], lo1=lonOld[i], la2=latNew[i], lo2=lonNew[i];
    const oldOk = !isNaN(la1)&&!isNaN(lo1)&&la1>=-90&&la1<=90&&lo1>=-180&&lo1<=180&&!(la1===0&&lo1===0);
    const newOk = !isNaN(la2)&&!isNaN(lo2)&&la2>=-90&&la2<=90&&lo2>=-180&&lo2<=180&&!(la2===0&&lo2===0);
    if (oldOk||newOk) pairs.push({la1,lo1,la2,lo2,oldOk,newOk,label:labelV?String(labelV[i]??""):null});
  }
  if (!pairs.length) { target.innerHTML = '<div style="color:#666;padding:14px">No valid pairs</div>'; return; }

  // Adaptive outlier filter (per-endpoint)
  const allCoords = [];
  pairs.forEach(p => { if (p.oldOk) allCoords.push({la:p.la1,lo:p.lo1,ref:"old",pair:p}); if (p.newOk) allCoords.push({la:p.la2,lo:p.lo2,ref:"new",pair:p}); });
  const flt = filterOutliers(allCoords, { bounds: s.bounds });
  const keptSet = new Set(flt.kept);
  allCoords.forEach(c => { if (!keptSet.has(c)) { if (c.ref==="old") c.pair.oldOk = false; else c.pair.newOk = false; } });
  const valid = pairs.filter(p => p.oldOk || p.newOk);
  if (!valid.length) { target.innerHTML = '<div style="color:#666;padding:14px">All filtered as outliers</div>'; return; }

  const sample = valid.length > 1500 ? valid.slice(0,1500) : valid;
  const map = L.map(divId, {preferCanvas:true});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {attribution:"© OSM", maxZoom:19}).addTo(map);
  dashboardMaps.push(map);

  // Optional radius overlay
  const shiftRadius = normalizeRadius(s.radius);
  const radiusTarget = (s.radius_target === "old") ? "old" : (s.radius_target === "both") ? "both" : "new";

  const bounds = [];
  sample.forEach(p => {
    const dist = (p.oldOk && p.newOk) ? haversine(p.la1,p.lo1,p.la2,p.lo2) : null;
    const popup = [
      p.label?"<b>"+p.label+"</b><br/>":"",
      p.oldOk?"🔴 Old<br/>":"", p.newOk?"🟢 New<br/>":"",
      dist!==null?"<b>📏 "+fmtDist(dist)+"</b>":"",
    ].join("");
    if (p.oldOk && p.newOk) {
      L.polyline([[p.la1,p.lo1],[p.la2,p.lo2]], {color:"#888",weight:1,opacity:0.5,dashArray:"4,3"}).bindPopup(popup,{maxWidth:200}).addTo(map);
    }
    if (p.oldOk) { bounds.push([p.la1,p.lo1]); L.circleMarker([p.la1,p.lo1], {radius:4,fillColor:"#ef476f",color:"#fff",fillOpacity:0.9,weight:1}).bindPopup(popup,{maxWidth:200}).addTo(map); }
    if (p.newOk) { bounds.push([p.la2,p.lo2]); L.circleMarker([p.la2,p.lo2], {radius:4,fillColor:"#06d6a0",color:"#fff",fillOpacity:0.9,weight:1}).bindPopup(popup,{maxWidth:200}).addTo(map); }
    // Radius circles
    if (shiftRadius) {
      if ((radiusTarget === "new" || radiusTarget === "both") && p.newOk)
        L.circle([p.la2,p.lo2], {radius:shiftRadius, fillColor:"#06d6a0", color:"#06d6a0", fillOpacity:0.12, weight:1, opacity:0.5}).addTo(map);
      if ((radiusTarget === "old" || radiusTarget === "both") && p.oldOk)
        L.circle([p.la1,p.lo1], {radius:shiftRadius, fillColor:"#ef476f", color:"#ef476f", fillOpacity:0.12, weight:1, opacity:0.5}).addTo(map);
    }
  });
  if (bounds.length) map.fitBounds(L.latLngBounds(bounds), {padding:[14,14]});
}

  dashboardMaps.push(map);
}

// =================================================================
//  CHART RENDERERS
// =================================================================
function getTableRows(spec) {
  if (!tableData) return { columns: [], rows: [] };
  const allCols = Object.keys(tableData).filter(c => c !== "manualSort" && !c.startsWith("gristHelper"));
  const requested = Array.isArray(spec.columns) && spec.columns.length ? spec.columns : allCols.slice(0, 8);
  const columns = requested.map(resolveColumn).filter(Boolean);
  const idx = getFilteredIndices(spec.filters);
  let rows = idx.slice();
  if (spec.sort?.col) {
    const sCol = resolveColumn(spec.sort.col);
    const dir = String(spec.sort.dir || "asc").toLowerCase() === "desc" ? -1 : 1;
    if (sCol) {
      rows.sort((a,b) => {
        const av = tableData[sCol][a], bv = tableData[sCol][b];
        const an = Number(av), bn = Number(bv);
        if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
        return String(av ?? "").localeCompare(String(bv ?? "")) * dir;
      });
    }
  }
  const limit = Math.max(1, Math.min(Number(spec.limit || 50), 500));
  rows = rows.slice(0, limit).map(i => {
    const row = {};
    columns.forEach(c => row[c] = tableData[c]?.[i]);
    return row;
  });
  return { columns, rows };
}

function tableHtml(spec, compact=false) {
  const { columns, rows } = getTableRows(spec);
  if (!columns.length) return '<div style="color:#ff7070;padding:14px">No table columns found.</div>';
  if (!rows.length) return '<div style="color:#666;padding:14px">No matching records.</div>';
  const maxCell = compact ? 60 : 120;
  return `
    <div style="height:100%;overflow:auto;padding:10px;">
      <table style="width:100%;border-collapse:collapse;font-size:${compact ? "10px" : "12px"};">
        <thead>
          <tr>${columns.map(c => `<th style="position:sticky;top:0;background:#0f3460;color:#dbeafe;text-align:left;padding:6px;border-bottom:1px solid #1e4d80;">${escapeHtml(c)}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${rows.map((r,ri) => `<tr style="background:${ri%2 ? "#151526" : "#1a1a2e"};">${
            columns.map(c => {
              let v = r[c];
              if (v === null || v === undefined || v === "") v = "—";
              v = String(v);
              if (v.length > maxCell) v = v.slice(0, maxCell) + "...";
              return `<td style="padding:6px;border-bottom:1px solid #252545;color:#c0c0d0;vertical-align:top;">${escapeHtml(v)}</td>`;
            }).join("")
          }</tr>`).join("")}
        </tbody>
      </table>
    </div>`;
}

function renderTable(s) {

}

function renderBar(s) {
  showPlotly();
  const idx = getFilteredIndices(s.filters);
  // Multi-series: y_cols overrides single y_col
  if (s.y_cols && Array.isArray(s.y_cols) && s.y_cols.length) {
    const traces = multiTraces(s, idx, "count");
    if (!traces || !traces.length) { vizError("No data for multi-series bar."); return; }
    traces.forEach(t => { t.type = "bar"; delete t.mode; });
    Plotly.react("plotly-div", traces, {
      ...currentLayout(), barmode: s.stacked ? "stack" : "group",
      title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
      ...buildReferenceLines(s),
    },{responsive:true,displayModeBar:true, displaylogo:false});
    return;
  }
  const agg = aggregate(s.x_col, s.y_col||null, s.agg||"count", idx, s.date_bucket);
  if (!agg.labels.length) { vizError(agg._diag || "No data found (either column missing or filters returned 0 results)."); return; }
  const {labels,values} = agg;
  // Comparison mode: dual traces with compare_filters
  let compareTraces = null;
  if (Array.isArray(s.compare_filters) && s.compare_filters.length) {
    const cmpIdx = getFilteredIndices(s.compare_filters);
    const cmp = aggregate(s.x_col, s.y_col||null, s.agg||"count", cmpIdx, s.date_bucket);
    if (cmp.labels.length) {
      compareTraces = {
        type: "bar",
        x: cmp.labels, y: cmp.values,
        name: "Compare", marker: { color: "#ef476f", opacity: 0.6 },
        hovertemplate: "%{x}: <b>%{y}</b><extra></extra>",
      };
    }
  }
  const yLabel = s.y_col ? (s.agg||"sum")+"("+s.y_col+")" : "Count";
  const isH = s.orientation === "h" || s.orientation === "horizontal";
  const trace = isH
    ? { type:"bar", y:labels, x:values, orientation:"h",
        marker:{color:PALETTE[0], opacity:0.85},
        hovertemplate:"%{y}: <b>%{x}</b><extra></extra>" }
    : { type:"bar", x:labels, y:values,
        marker:{color:PALETTE[0], opacity:0.85},
        hovertemplate:"%{x}: <b>%{y}</b><extra></extra>" };
  // Reverse y for horizontal so largest is on top
  if (isH) labels.reverse(), values.reverse();
  const barTraces = compareTraces ? [trace, compareTraces] : [trace];
  Plotly.react("plotly-div", barTraces, {
    ...currentLayout(),
    barmode: "group",
    title:{text:s.title||"", font:{color:"#c0c0d0",size:13}},
    xaxis: isH
      ? {...currentLayout().xaxis, title:{text:yLabel,font:{color:"#888",size:10}}}
      : {...currentLayout().xaxis, tickangle:-35, type:'category', automargin:true},
    yaxis: isH
      ? {...currentLayout().yaxis, automargin:true, type:'category'}
      : {...currentLayout().yaxis, title:{text:yLabel,font:{color:"#888",size:10}}},
    margin: isH ? {t:46,b:46,l:140,r:18} : currentLayout().margin,
    ...buildReferenceLines(s),
  },{responsive:true,displayModeBar:true, displaylogo:false});
}

function renderLine(s) {
  showPlotly();
  const idx = getFilteredIndices(s.filters);
  // Multi-series: y_cols array for multiple lines
  if (s.y_cols && Array.isArray(s.y_cols) && s.y_cols.length) {
    const traces = multiTraces(s, idx, "sum");
    if (!traces || !traces.length) { vizError("No data for multi-series line."); return; }
    Plotly.react("plotly-div", traces, {
      ...currentLayout(),
      title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
      ...buildReferenceLines(s),
    },{responsive:true,displayModeBar:true, displaylogo:false});
    return;
  }
  const agg = aggregate(s.x_col, s.y_col||null, s.agg||"sum", idx, s.date_bucket);
  if (!agg.labels.length) { vizError(agg._diag || "No data found (either column missing or filters returned 0 results)."); return; }
  const {labels,values} = agg;
  // Comparison mode
  let lineTraces = [{
    type:"scatter", mode:"lines+markers",
    x:labels, y:values,
    line:{color:PALETTE[0],width:2},
    marker:{color:PALETTE[0],size:5},
  }];
  if (Array.isArray(s.compare_filters) && s.compare_filters.length) {
    const cmpIdx = getFilteredIndices(s.compare_filters);
    const cmp = aggregate(s.x_col, s.y_col||null, s.agg||"sum", cmpIdx, s.date_bucket);
    if (cmp.labels.length) {
      lineTraces.push({
        type:"scatter", mode:"lines+markers",
        x:cmp.labels, y:cmp.values, name:"Compare",
        line:{color:"#ef476f",width:2,dash:"dash"},
        marker:{color:"#ef476f",size:5},
      });
    }
  }
  Plotly.react("plotly-div", lineTraces, {
    ...currentLayout(),
    title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
    ...buildReferenceLines(s),
  },{responsive:true,displayModeBar:true, displaylogo:false});
}

// Area chart — same spec as line but with fill
function renderArea(s) {
  showPlotly();
  const idx = getFilteredIndices(s.filters);
  if (s.y_cols && Array.isArray(s.y_cols) && s.y_cols.length) {
    const traces = multiTraces(s, idx, "sum");
    if (!traces || !traces.length) { vizError("No data for area chart."); return; }
    traces.forEach(t => { t.fill = "tozeroy"; t.mode = "lines"; t.opacity = 0.5; });
    Plotly.react("plotly-div", traces, {
      ...currentLayout(),
      title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
      ...buildReferenceLines(s),
    },{responsive:true,displayModeBar:true, displaylogo:false});
    return;
  }
  const agg = aggregate(s.x_col, s.y_col||null, s.agg||"sum", idx, s.date_bucket);
  if (!agg.labels.length) { vizError(agg._diag || "No data found for area chart."); return; }
  const {labels,values} = agg;
  Plotly.react("plotly-div", [{
    type:"scatter", mode:"lines", fill:"tozeroy",
    x:labels, y:values,
    line:{color:PALETTE[0],width:2},
    marker:{color:PALETTE[0],size:5},
  }], {
    ...currentLayout(),
    title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
    ...buildReferenceLines(s),
  },{responsive:true,displayModeBar:true, displaylogo:false});
}

function renderPie(s) {
  showPlotly();
  const idx = getFilteredIndices(s.filters);
  const agg = aggregate(s.names_col, s.values_col||null, s.agg||"count", idx);
  if (!agg.labels.length) { vizError(agg._diag || "No data found (either column missing or filters returned 0 results)."); return; }
  const {labels,values} = agg;
  // Collapse small slices
  const total = values.reduce((a,b)=>a+b,0);
  const threshold = total * 0.015;
  let otherVal = 0;
  const filtL=[], filtV=[];
  labels.forEach((l,i)=>{
    if (values[i] >= threshold) { filtL.push(l); filtV.push(values[i]); }
    else otherVal += values[i];
  });
  if (otherVal > 0) { filtL.push("Others"); filtV.push(+otherVal.toFixed(4)); }
  Plotly.react("plotly-div", [{
    type:"pie", labels:filtL, values:filtV, hole:0.38,
    marker:{colors:PALETTE},
    textinfo:"label+percent",
    hovertemplate:"%{label}: %{value} (%{percent})<extra></extra>",
  }], {
    ...currentLayout(),
    margin:{t:46,b:10,l:10,r:10},
    title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
    showlegend:true,
    legend:{font:{color:"#c0c0d0",size:10},bgcolor:"transparent",orientation:"v"},
  },{responsive:true,displayModeBar:true, displaylogo:false});
}

function renderScatter(s) {
  showPlotly();
  const filtIdx = getFilteredIndices(s.filters);
  const rxCol = resolveColumn(s.x_col);
  const ryCol = resolveColumn(s.y_col);
  const xvAll = rxCol ? (tableData[rxCol]||[]).map(Number) : [];
  const yvAll = ryCol ? (tableData[ryCol]||[]).map(Number) : [];
  if (!xvAll.length) { vizError("No data found (either column missing or filters returned 0 results)."); return; }
  const xv = filtIdx.map(i => xvAll[i]);
  const yv = filtIdx.map(i => yvAll[i]);
  let traces;
  const rColor = resolveColumn(s.color_col);
  if (rColor && tableData[rColor]) {
    const colData = tableData[rColor];
    const cats = [...new Set(filtIdx.map(i => colData[i]))];
    traces = cats.map((cat,i) => {
      const subIdx = filtIdx.filter(j => colData[j] === cat);
      return {
        type:"scatter", mode:"markers", name:String(cat),
        x:subIdx.map(j=>xvAll[j]), y:subIdx.map(j=>yvAll[j]),
        marker:{color:PALETTE[i%PALETTE.length], size:5, opacity:0.7},
      };
    });
  } else {
    traces = [{
      type:"scatter", mode:"markers",
      x:xv, y:yv,
      marker:{color:PALETTE[0], size:5, opacity:0.7},
    }];
  }
  Plotly.react("plotly-div", traces, {
    ...currentLayout(),
    title:{text:s.title||"",font:{color:"#c0c0d0",size:13}},
    xaxis:{...currentLayout().xaxis, title:{text:s.x_col,font:{color:"#888",size:10}}},
    yaxis:{...currentLayout().yaxis, title:{text:s.y_col,font:{color:"#888",size:10}}},
    legend:{font:{color:"#c0c0d0",size:10},bgcolor:"transparent"},
    ...buildReferenceLines(s),
  },{responsive:true,displayModeBar:true, displaylogo:false});
}

// Multi-series helper — generate one trace per y_cols entry
function multiTraces(s, idx, defaultAgg) {
  if (!s.y_cols || !Array.isArray(s.y_cols) || !s.y_cols.length) return null;
  const xCol = resolveColumn(s.x_col);
  const xv = xCol ? tableData[xCol] : null;
  if (!xv) return null;
  return s.y_cols.map((yc, i) => {
    const yCol = resolveColumn(yc);
    const yv = yCol && tableData[yCol] ? tableData[yCol].map(Number) : null;
    const agg = s.agg || defaultAgg;
    const {labels, values} = aggregate(s.x_col, yc, agg, idx, s.date_bucket);
    return {
      type: "scatter", mode: "lines+markers" + (s.mode ? "" : ""),
      x: labels, y: values, name: yc,
      line: { color: PALETTE[i % PALETTE.length], width: 2 },
      marker: { color: PALETTE[i % PALETTE.length], size: 5 },
    };
  });
}

// Histogram
function renderHistogram(s) {
  showPlotly();
  const idx = getFilteredIndices(s.filters);
  const rCol = resolveColumn(s.x_col);
  if (!rCol || !tableData[rCol]) { vizError("Column not found: " + s.x_col); return; }
  // Apply filters by indexing — earlier this collected idx but never used it,
  // so a histogram of "height for pending sites" silently showed ALL rows.
  const colData = tableData[rCol];
  const vals = idx.map(i => +colData[i]).filter(n => !isNaN(n));
  if (!vals.length) { vizError("No numeric data for histogram."); return; }
  Plotly.react("plotly-div", [{
    type: "histogram", x: vals,
    nbinsx: s.nbins || 20,
    marker: { color: PALETTE[0], opacity: 0.8 },
  }], {
    ...currentLayout(),
    title: { text: s.title || "Histogram of " + s.x_col, font: { color: "#c0c0d0", size: 13 }},
    xaxis: { ...currentLayout().xaxis, title: { text: s.x_col, font: { color: "#888", size: 10 }}},
  }, { responsive: true, displayModeBar: true, displaylogo: false });
}

// Box plot
function renderBox(s) {
  showPlotly();
  const idx = getFilteredIndices(s.filters);
  const rXCol = resolveColumn(s.x_col);
  const rYCol = resolveColumn(s.y_col);
  const xv = rXCol && tableData[rXCol] ? tableData[rXCol] : null;
  const yv = rYCol && tableData[rYCol] ? tableData[rYCol].map(Number) : null;
  if (!xv || !yv) { vizError("Both x_col and y_col required for box plot."); return; }
  // Group by x_col categories
  const groups = {};
  idx.forEach(i => {
    const cat = String(xv[i] ?? "(empty)");
    if (!groups[cat]) groups[cat] = [];
    const n = yv[i];
    if (!isNaN(n)) groups[cat].push(n);
  });
  const traces = Object.entries(groups).map(([cat, arr], i) => ({
    type: "box", y: arr, name: cat,
    marker: { color: PALETTE[i % PALETTE.length] },
  }));
  if (!traces.length) { vizError("No valid data for box plot."); return; }
  Plotly.react("plotly-div", traces, {
    ...currentLayout(),
    title: { text: s.title || ("Box plot — " + s.y_col + " by " + s.x_col), font: { color: "#c0c0d0", size: 13 }},
    yaxis: { ...currentLayout().yaxis, title: { text: s.y_col, font: { color: "#888", size: 10 }}},
  }, { responsive: true, displayModeBar: true, displaylogo: false });
}

// Heatmap — dense point density map
function renderHeatmap(s) {
  showLeaflet();
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  // Resolve column names so casing/underscore variants from the LLM work.
  const rLat = resolveColumn(s.lat_col);
  const rLon = resolveColumn(s.lon_col);
  if (!rLat || !rLon) { vizError("Heatmap columns not found: " + s.lat_col + " / " + s.lon_col); return; }
  const rInt = resolveColumn(s.intensity_col);
  const latv = (tableData[rLat]||[]).map(Number);
  const lonv = (tableData[rLon]||[]).map(Number);
  const intCol = rInt && tableData[rInt] ? tableData[rInt] : null;
  const idx = getFilteredIndices(s.filters);
  const pts = [];
  for (const i of idx) {
    const la = latv[i], lo = lonv[i];
    if (!isNaN(la) && !isNaN(lo) && la >= -90 && la <= 90 && lo >= -180 && lo <= 180 && !(la === 0 && lo === 0)) {
      pts.push([la, lo, intCol ? (+intCol[i] || 1) : 1]);
    }
  }
  if (!pts.length) { vizError("No valid coordinates for heatmap."); return; }
  leafletMap = L.map("map-div", { preferCanvas: true });
  const osmLayer = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OSM", maxZoom: 19,
  }).addTo(leafletMap);
  const satLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: "© Esri", maxZoom: 19,
  });
  L.control.layers({ "Street": osmLayer, "Satellite": satLayer }, null, { position: "topleft", collapsed: true }).addTo(leafletMap);
  const heat = L.heatLayer(pts, {
    radius: s.heat_radius || 25,
    blur: s.heat_blur || 15,
    maxZoom: 17,
    max: s.heat_max || undefined,
    gradient: s.heat_gradient || { 0.4: "blue", 0.6: "cyan", 0.7: "lime", 0.8: "yellow", 1.0: "red" },
  }).addTo(leafletMap);
  leafletMap.fitBounds(L.latLngBounds(pts.map(p => [p[0], p[1]])), { padding: [20, 20] });
  sysMsg("Heatmap: " + pts.length.toLocaleString() + " points.");
  document.getElementById("download-html-btn").style.display = "inline";
  lastMapData = { kind: "heatmap", title: s.title || "Heatmap", points: pts };
}

// Choropleth — GeoJSON regions colored by data column
async function renderChoropleth(s) {
  showLeaflet();
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  if (!tableData) { vizError("No data loaded."); return; }
  const rVal = resolveColumn(s.value_col);
  const rReg = resolveColumn(s.region_col);
  if (!rVal || !rReg) { vizError("Both value_col and region_col required for choropleth."); return; }

  // Build lookup: region → value
  const lookup = {};
  const vals = tableData[rVal] || [];
  const regs = tableData[rReg] || [];
  const idx = getFilteredIndices(s.filters);
  const allValues = [];
  for (const i of idx) {
    const r = String(regs[i] ?? "").trim().toLowerCase();
    const v = +vals[i];
    if (r && !isNaN(v)) {
      // Accumulate sum and count for correct avg calculation
      lookup._sum = (lookup._sum || 0) + v;
      lookup._cnt = (lookup._cnt || 0) + 1;
      if (s.agg === "avg") lookup[r] = lookup._sum / lookup._cnt;
      else if (s.agg === "max") lookup[r] = Math.max(lookup[r] || -Infinity, v);
      else lookup[r] = (lookup[r] || 0) + v;
      allValues.push(v);
    }
  }
  // Clean up temporary accumulation keys
  for (const k of Object.keys(lookup)) { if (k.startsWith("_")) delete lookup[k]; }
  if (!allValues.length) { vizError("No valid region/value pairs."); return; }
  const minV = safeMin(allValues), maxV = safeMax(allValues);

  // Color scale
  const colors = s.colors || ["#023858","#045a8d","#0570b0","#3690c0","#74a9cf","#a6bddb","#d0d1e6","#ece7f2"];
  function colorFn(v) {
    const t = maxV > minV ? (v - minV) / (maxV - minV) : 0.5;
    const idx = Math.min(colors.length - 1, Math.floor(t * colors.length));
    return colors[idx];
  }

  // Load GeoJSON
  let geojson;
  if (s.geojson_url) {
    try {
      const resp = await fetch(s.geojson_url);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      geojson = await resp.json();
    } catch(e) { vizError("Failed to load GeoJSON: " + e.message); return; }
  } else if (s.geojson) {
    geojson = s.geojson;
  } else {
    vizError("geojson_url or geojson required for choropleth."); return;
  }

  // Init map
  leafletMap = L.map("map-div", { preferCanvas: true });
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OSM", maxZoom: 19,
  }).addTo(leafletMap);
  const satLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: "© Esri", maxZoom: 19,
  });
  L.control.layers({ "Street": L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}) }, { "Satellite": satLayer }, { position: "topleft", collapsed: true }).addTo(leafletMap);

  // Render GeoJSON
  const layer = L.geoJSON(geojson, {
    style: function(feature) {
      const name = (feature.properties.name || feature.properties.NAME || feature.properties.NL_NAME_1 || "").toLowerCase();
      const value = lookup[name];
      return {
        fillColor: value !== undefined ? colorFn(value) : "#333",
        weight: 1, opacity: 0.8, color: "#555",
        fillOpacity: value !== undefined ? 0.75 : 0.2,
      };
    },
    onEachFeature: function(feature, lyr) {
      const name = (feature.properties.name || feature.properties.NAME || feature.properties.NL_NAME_1 || "");
      const value = lookup[name.toLowerCase()];
      lyr.bindPopup(`<b>${name}</b><br/>${s.value_col}: ${value !== undefined ? value.toLocaleString() : "—"}`);
    },
  }).addTo(leafletMap);
  leafletMap.fitBounds(layer.getBounds(), { padding: [20, 20] });

  // Legend
  const leg = document.getElementById("map-legend");
  const steps = 5;
  let legHTML = `<strong style="font-size:10px;color:#aaa">${s.value_col}</strong>`;
  for (let i = 0; i < steps; i++) {
    const v = minV + (maxV - minV) * i / (steps - 1);
    const c = colorFn(v);
    legHTML += `<div class="leg-item"><div class="leg-dot" style="background:${c}"></div><span>${Math.round(v).toLocaleString()}</span></div>`;
  }
  leg.innerHTML = legHTML;
  leg.style.display = "block";
  document.getElementById("download-html-btn").style.display = "inline";
  sysMsg("Choropleth: " + Object.keys(lookup).length + " regions matched.");
}

// =================================================================
//  MAP RENDERER — fixed radius, column radius, or plain dots
// =================================================================

// Normalize radius: LLM system prompt may specify km, widget uses metres.
// Heuristic: ≤ 5 → treat as km and convert to metres; > 5 → already metres.
function normalizeRadius(r) {
  if (typeof r !== "number" || r <= 0) return null;
  return r <= 5 ? Math.round(r * 1000) : Math.round(r);
}

function renderMap(s) {
  showLeaflet();
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }

  // Use resolveColumn so case/underscore mismatches from the LLM don't
  // silently produce an empty map (renderShiftMap already does this).
  const rLat = resolveColumn(s.lat_col);
  const rLon = resolveColumn(s.lon_col);
  if (!rLat || !rLon) { vizError("Map columns not found: " + s.lat_col + " / " + s.lon_col); return; }
  const rColor = resolveColumn(s.color_col);
  const latv = (tableData[rLat]||[]).map(Number);
  const lonv = (tableData[rLon]||[]).map(Number);
  const colv = rColor && tableData[rColor] ? tableData[rColor] : null;

  // Determine radius mode:
  // 1. s.radius  — fixed number in metres (e.g. 200), applies to all points
  // 2. s.radius_col — column name with per-row values in metres
  // 3. neither   — plain dot markers
  const fixedRadius = normalizeRadius(s.radius);
  const rRadius = resolveColumn(s.radius_col);
  const radColData  = (!fixedRadius && rRadius && tableData[rRadius])
                        ? tableData[rRadius].map(Number) : null;
  const useCircles  = fixedRadius !== null || radColData !== null;
  const maxPts      = useCircles ? 2000 : 5000;

  // Apply filters → list of valid row indices
  const filtIdx = getFilteredIndices(s.filters);

  // Build valid point list (basic range + reject 0,0)
  const ptsRaw = [];
  for (const i of filtIdx) {
    const la = latv[i], lo = lonv[i];
    if (!isNaN(la) && !isNaN(lo) && la >= -90 && la <= 90 && lo >= -180 && lo <= 180
        && !(la === 0 && lo === 0)) {
      let rad = null;
      if (fixedRadius) {
        rad = fixedRadius;
      } else if (radColData) {
        const rv = radColData[i];
        rad = (!isNaN(rv) && rv > 0) ? rv : null;
      }
      ptsRaw.push({ la, lo, rad, cat: colv ? colv[i] : null, idx: i });
    }
  }
  if (!ptsRaw.length) {
    vizError("No valid coordinates in " + s.lat_col + "/" + s.lon_col);
    return;
  }

  // Adaptive outlier filter (MAD-based, or hard bounds if provided)
  const flt = filterOutliers(ptsRaw, { bounds: s.bounds });
  const pts = flt.kept;
  if (flt.rejected > 0) sysMsg(`⚠ Filtered ${flt.rejected} outlier(s) · ${flt.method} · ${flt.info}`);
  if (!pts.length) { vizError("All points filtered as outliers — data may be corrupted."); return; }

  const sample = pts.length > maxPts ? pts.slice(0, maxPts) : pts;

  // Color map
  const cats = colv ? [...new Set(pts.map(p => p.cat))] : [];
  const catColor = {};
  cats.forEach((c, i) => catColor[c] = PALETTE[i % PALETTE.length]);

  // Init Leaflet
  leafletMap = L.map("map-div", { preferCanvas: true });
  const osmLayer = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors", maxZoom: 19,
  }).addTo(leafletMap);
  const satLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: "© Esri", maxZoom: 19,
  });
  L.control.layers({ "Street": osmLayer, "Satellite": satLayer }, null, { position: "topleft", collapsed: true }).addTo(leafletMap);

  // Draw points — use MarkerCluster for dense dot sets (>500 plain points)
  const useCluster = !useCircles && sample.length > 500 && typeof L.markerClusterGroup === "function";
  const clusterGroup = useCluster ? L.markerClusterGroup({ maxClusterRadius: 50, disableClusteringAtZoom: 15 }) : null;
  if (clusterGroup) clusterGroup.addTo(leafletMap);

  sample.forEach(p => {
    const color = colv ? (catColor[p.cat] || "#00b4d8") : "#00b4d8";
    const popup = buildPopup(p.idx, s);

    if (useCircles && p.rad !== null) {
      // L.circle = real geographic circle in metres — no cluster
      const circle = L.circle([p.la, p.lo], {
        radius:      p.rad,
        fillColor:   color,
        color:       color,
        fillOpacity: 0.18,
        weight:      1,
        opacity:     0.7,
      });
      if (popup) circle.bindPopup(popup, { maxWidth: 280 });
      circle.addTo(leafletMap);
    } else if (clusterGroup) {
      // Cluster marker
      const m = L.circleMarker([p.la, p.lo], {
        radius:      5,
        fillColor:   color,
        color:       "rgba(0,0,0,0.3)",
        fillOpacity: 0.85,
        weight:      0.5,
      });
      if (popup) m.bindPopup(popup, { maxWidth: 280 });
      clusterGroup.addLayer(m);
    } else {
      // Plain dot — no cluster
      const m = L.circleMarker([p.la, p.lo], {
        radius:      5,
        fillColor:   color,
        color:       "rgba(0,0,0,0.3)",
        fillOpacity: 0.85,
        weight:      0.5,
      });
      if (popup) m.bindPopup(popup, { maxWidth: 280 });
      m.addTo(leafletMap);
    }
  });

  // Fit bounds
  leafletMap.fitBounds(
    L.latLngBounds(sample.map(p=>[p.la,p.lo])),
    {padding:[20,20]}
  );

  // Legend
  if (cats.length > 0) {
    const leg = document.getElementById("map-legend");
    leg.innerHTML = "<strong class='leg-title'>" +
                    (s.color_col||"Category") + "</strong>";
    cats.slice(0,10).forEach(c => {
      const item = document.createElement("div");
      item.className = "leg-item";
      item.innerHTML = `<div class="leg-dot" style="background:${catColor[c]}"></div>
                        <span>${c ?? "(empty)"}</span>`;
      leg.appendChild(item);
    });
    if (cats.length > 10) {
      const more = document.createElement("div");
      more.style.cssText = "color:#555;font-size:9px;margin-top:3px;";
      more.textContent = "+" + (cats.length-10) + " more";
      leg.appendChild(more);
    }
    leg.style.display = "block";
  }

  // Radius badge on the map (top-right Leaflet control)
  if (useCircles) {
    const RadiusControl = L.Control.extend({
      onAdd: function() {
        const div = L.DomUtil.create("div");
        div.style.cssText = [
          "background:rgba(19,19,31,0.88)",
          "color:#00b4d8",
          "border:1px solid #0f3460",
          "border-radius:6px",
          "padding:5px 11px",
          "font-size:12px",
          "font-family:-apple-system,sans-serif",
          "pointer-events:none",
          "line-height:1.4",
        ].join(";");
        const label = fixedRadius
          ? "⭕ &nbsp;Radius: <strong>" + fixedRadius.toLocaleString() + " m</strong>"
          : "📡 &nbsp;Radius col: <strong>" + s.radius_col + "</strong>";
        div.innerHTML = label;
        return div;
      }
    });
    new RadiusControl({ position: "topright" }).addTo(leafletMap);
  }

  // Update viz-panel title to show radius
  if (useCircles) {
    const radiusLabel = fixedRadius
      ? fixedRadius.toLocaleString() + "m radius"
      : s.radius_col + " radius";
    document.getElementById("viz-title").textContent =
      (s.title || "Map") + "  —  " + radiusLabel + "  [" + (tableName||"") + "]";
  }

  // Info message in chat
  let infoMsg = "Showing " + sample.length.toLocaleString() + " of " +
                pts.length.toLocaleString() + " points";
  if (fixedRadius)     infoMsg += " • fixed radius " + fixedRadius + "m";
  else if (radColData) infoMsg += " • radius from column: " + s.radius_col;
  if (sample.length < pts.length) infoMsg += " (sampled)";
  sysMsg(infoMsg);

  // Cache for interactive HTML export
  lastMapData = {
    kind: "map",
    title: s.title || "Map",
    points: sample.map(p => ({
      la: p.la, lo: p.lo, rad: p.rad,
      color: colv ? (catColor[p.cat] || "#00b4d8") : "#00b4d8",
      popup: buildPopup(p.idx, s),
    })),
    fixedRadius: fixedRadius,
    radiusColName: radColData ? s.radius_col : null,
    legendCats: cats.slice(0,10).map(c => ({label:String(c??"(empty)"), color:catColor[c]})),
    legendTitle: s.color_col,
  };
}

// =================================================================
//  OUTLIER FILTER — adaptive MAD-based statistical detection
// =================================================================
//   • Reject obvious placeholders (0,0)
//   • If LLM provided bounds, hard-filter to that box first
//   • Otherwise: compute median + MAD for lat/lon independently,
//     reject anything beyond k·MAD from median (k=6, conservative)
//   • Adapts automatically: city-data → tight, country-data → loose
// =================================================================
function quickMedian(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  return s[Math.floor(s.length / 2)];
}

function filterOutliers(coords, opts) {
  opts = opts || {};

  // Phase 1: hard reject (0,0)
  let valid = coords.filter(c => !(c.la === 0 && c.lo === 0));

  // Phase 2: hard bounds if provided
  if (opts.bounds) {
    const b = opts.bounds;
    valid = valid.filter(c =>
      c.la >= b.min_lat && c.la <= b.max_lat &&
      c.lo >= b.min_lon && c.lo <= b.max_lon
    );
    return {
      kept:     valid,
      rejected: coords.length - valid.length,
      method:   "user-bounds",
      info:     `bounds [${b.min_lat},${b.min_lon}] – [${b.max_lat},${b.max_lon}]`,
    };
  }

  // Need at least 5 points for statistical detection
  if (valid.length < 5) {
    return { kept: valid, rejected: coords.length - valid.length, method: "none" };
  }

  // Phase 3: MAD-based adaptive filter
  const lats = valid.map(c => c.la);
  const lons = valid.map(c => c.lo);
  const medLat = quickMedian(lats);
  const medLon = quickMedian(lons);

  const madLat = quickMedian(lats.map(v => Math.abs(v - medLat)));
  const madLon = quickMedian(lons.map(v => Math.abs(v - medLon)));

  // 1.4826 — scale factor to make MAD comparable to std-dev for normal data
  // k=6 — permissive, lets naturally wide-spread data through
  // floor=0.3° (~33km) — minimum tolerance to avoid over-tight bounds for tightly clustered data
  const k        = 6;
  const floor    = 0.3;
  const sigmaLat = Math.max(floor, madLat * 1.4826);
  const sigmaLon = Math.max(floor, madLon * 1.4826);
  const thLat    = k * sigmaLat;
  const thLon    = k * sigmaLon;

  const kept = valid.filter(c =>
    Math.abs(c.la - medLat) <= thLat &&
    Math.abs(c.lo - medLon) <= thLon
  );

  return {
    kept,
    rejected: coords.length - kept.length,
    method:   "MAD",
    info:     `centre ≈ (${medLat.toFixed(2)}, ${medLon.toFixed(2)}), tolerance ±${thLat.toFixed(2)}°/±${thLon.toFixed(2)}°`,
  };
}

// =================================================================
//  HAVERSINE — straight-line distance in metres between two coords
// =================================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function fmtDist(m) {
  return m >= 1000 ? (m/1000).toFixed(2) + " km" : Math.round(m) + " m";
}

// =================================================================
//  SHIFT MAP — old vs new locations with connecting lines + distance
// =================================================================

// Auto-correct shift_map column names using detected coord pairs.
// Called before rendering shift_map to fix LLM column-name errors.
function autoCorrectShiftMap(s) {
  if (_detectedCoordPairs.old && (!resolveColumn(s.lat_old) || !resolveColumn(s.lon_old))) {
    s.lat_old = _detectedCoordPairs.old.lat;
    s.lon_old = _detectedCoordPairs.old.lon;
  }
  if (_detectedCoordPairs.new && (!resolveColumn(s.lat_new) || !resolveColumn(s.lon_new))) {
    s.lat_new = _detectedCoordPairs.new.lat;
    s.lon_new = _detectedCoordPairs.new.lon;
  }
  return s;
}

function renderShiftMap(s) {
  s = autoCorrectShiftMap(s);  // fix LLM column name errors
  showLeaflet();
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }

  const rLatOld = resolveColumn(s.lat_old);
  const rLonOld = resolveColumn(s.lon_old);
  const rLatNew = resolveColumn(s.lat_new);
  const rLonNew = resolveColumn(s.lon_new);
  if (!rLatOld || !rLonOld) {
    vizError("Columns not found: " + s.lat_old + " / " + s.lon_old); return;
  }
  const latOld = (tableData[rLatOld]||[]).map(Number);
  const lonOld = (tableData[rLonOld]||[]).map(Number);
  const latNew = (rLatNew ? tableData[rLatNew] : []).map(Number);
  const lonNew = (rLonNew ? tableData[rLonNew] : []).map(Number);
  const rLabel = resolveColumn(s.label_col);
  const labelV = rLabel && tableData[rLabel] ? tableData[rLabel] : null;

  // Optional radius overlay on shift_map — e.g. radius:200, radius_target:"new"
  const shiftRadius = normalizeRadius(s.radius);
  const radiusTarget = (s.radius_target === "old") ? "old" : (s.radius_target === "both") ? "both" : "new";

  // Apply filters → list of valid row indices
  const filtIdx = getFilteredIndices(s.filters);

  // Build valid pairs (basic [-90,90][-180,180] check + reject 0,0)
  const pairs = [];
  for (const i of filtIdx) {
    const la1=latOld[i], lo1=lonOld[i], la2=latNew[i], lo2=lonNew[i];
    const oldOk = !isNaN(la1)&&!isNaN(lo1)&&la1>=-90&&la1<=90&&lo1>=-180&&lo1<=180
                  && !(la1===0 && lo1===0);
    const newOk = !isNaN(la2)&&!isNaN(lo2)&&la2>=-90&&la2<=90&&lo2>=-180&&lo2<=180
                  && !(la2===0 && lo2===0);
    if (oldOk || newOk) {
      pairs.push({ la1, lo1, la2, lo2, oldOk, newOk,
                   label: labelV ? String(labelV[i]??"") : null, idx: i });
    }
  }
  if (!pairs.length) { vizError("No valid coordinates found."); return; }

  // Adaptive outlier filter — flag old/new endpoints separately
  const allCoords = [];
  pairs.forEach(p => {
    if (p.oldOk) allCoords.push({ la:p.la1, lo:p.lo1, ref:"old", pair:p });
    if (p.newOk) allCoords.push({ la:p.la2, lo:p.lo2, ref:"new", pair:p });
  });
  const flt = filterOutliers(allCoords, { bounds: s.bounds });
  const keptSet = new Set(flt.kept);
  let rejectedEndpoints = 0;
  allCoords.forEach(c => {
    if (!keptSet.has(c)) {
      if (c.ref === "old") c.pair.oldOk = false;
      else c.pair.newOk = false;
      rejectedEndpoints++;
    }
  });
  if (rejectedEndpoints > 0) sysMsg(`⚠ Filtered ${rejectedEndpoints} outlier endpoint(s) · ${flt.method} · ${flt.info}`);

  // Re-filter pairs that lost both endpoints
  const validPairs = pairs.filter(p => p.oldOk || p.newOk);
  const sample = validPairs.length > 2000 ? validPairs.slice(0,2000) : validPairs;

  // Init map
  leafletMap = L.map("map-div", { preferCanvas: true });
  const osmLayer2 = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors", maxZoom: 19,
  }).addTo(leafletMap);
  const satLayer2 = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: "© Esri", maxZoom: 19,
  });
  L.control.layers({ "Street": osmLayer2, "Satellite": satLayer2 }, null, { position: "topleft", collapsed: true }).addTo(leafletMap);

  const fitCoords = [];

  sample.forEach(p => {
    const dist = (p.oldOk && p.newOk) ? haversine(p.la1,p.lo1,p.la2,p.lo2) : null;
    // Site details from all non-coordinate columns
    const coordSkip = new Set([rLatOld, rLonOld, rLatNew, rLonNew].filter(Boolean));
    const detailLines = [];
    for (const [col, vals] of Object.entries(tableData)) {
      if (coordSkip.has(col)) continue;
      const v = vals[p.idx];
      if (v === null || v === undefined || v === "") continue;
      detailLines.push(`<b>${col}:</b> ${v}`);
      if (detailLines.length >= 8) break;
    }
    const popupHtml = [
      p.label ? `<b>${p.label}</b><br/>` : "",
      detailLines.length ? detailLines.join("<br/>") + "<br/>" : "",
      "<hr style='margin:4px 0;border-color:#444;'>",
      p.oldOk ? `🔴 Before: ${p.la1.toFixed(5)}, ${p.lo1.toFixed(5)}<br/>` : "",
      p.newOk ? `🟢 After: ${p.la2.toFixed(5)}, ${p.lo2.toFixed(5)}<br/>` : "",
      dist !== null ? `<b>📏 Distance: ${fmtDist(dist)}</b>` : "",
    ].join("");

    // Connecting line
    if (p.oldOk && p.newOk) {
      L.polyline([[p.la1,p.lo1],[p.la2,p.lo2]], {
        color:"#888", weight:1.2, opacity:0.6, dashArray:"5,4",
      }).bindPopup(popupHtml, {maxWidth:240}).addTo(leafletMap);
    }

    // Old location — red
    if (p.oldOk) {
      fitCoords.push([p.la1, p.lo1]);
      L.circleMarker([p.la1,p.lo1], {
        radius:6, fillColor:"#ef476f", color:"#fff",
        fillOpacity:0.9, weight:1.2,
      }).bindPopup(popupHtml, {maxWidth:240}).addTo(leafletMap);
    }

    // New location — green
    if (p.newOk) {
      fitCoords.push([p.la2, p.lo2]);
      L.circleMarker([p.la2,p.lo2], {
        radius:6, fillColor:"#06d6a0", color:"#fff",
        fillOpacity:0.9, weight:1.2,
      }).bindPopup(popupHtml, {maxWidth:240}).addTo(leafletMap);
    }

    // Optional radius circles (e.g. 200m around new/old/both locations)
    if (shiftRadius) {
      if ((radiusTarget === "new" || radiusTarget === "both") && p.newOk) {
        L.circle([p.la2,p.lo2], {
          radius: shiftRadius, fillColor:"#06d6a0", color:"#06d6a0",
          fillOpacity: 0.12, weight: 1.2, opacity: 0.5,
        }).bindPopup(popupHtml, {maxWidth:240}).addTo(leafletMap);
      }
      if ((radiusTarget === "old" || radiusTarget === "both") && p.oldOk) {
        L.circle([p.la1,p.lo1], {
          radius: shiftRadius, fillColor:"#ef476f", color:"#ef476f",
          fillOpacity: 0.12, weight: 1.2, opacity: 0.5,
        }).bindPopup(popupHtml, {maxWidth:240}).addTo(leafletMap);
      }
    }
  });

  if (fitCoords.length) {
    leafletMap.fitBounds(L.latLngBounds(fitCoords), {padding:[24,24]});
  }

  // Legend
  const leg = document.getElementById("map-legend");
  let radiusLegend = "";
  if (shiftRadius) {
    const targetLabel = radiusTarget === "old" ? "Old" : radiusTarget === "both" ? "Old & New" : "New";
    radiusLegend = `<div class="leg-item"><div class="leg-dot" style="background:transparent;border:2px solid ${radiusTarget==='old'?'#ef476f':'#06d6a0'};border-radius:50%"></div><span>${shiftRadius}m radius (${targetLabel})</span></div>`;
  }
  leg.innerHTML = `
    <strong class="leg-title">Location Shift</strong>
    <div class="leg-item"><div class="leg-dot" style="background:#ef476f"></div><span>Old location</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#06d6a0"></div><span>New location</span></div>
    <div class="leg-item">
      <span class="leg-shift">- -</span><span>Shift line</span>
    </div>${radiusLegend}`;
  leg.style.display = "block";

  // Distance stats
  const dists = sample
    .filter(p => p.oldOk && p.newOk)
    .map(p => haversine(p.la1,p.lo1,p.la2,p.lo2));
  if (dists.length) {
    const avg = dists.reduce((a,b)=>a+b,0)/dists.length;
    const max = safeMax(dists);
    const min = safeMin(dists);
    let statsMsg = `${sample.length} pairs · avg shift: ${fmtDist(avg)} · max: ${fmtDist(max)} · min: ${fmtDist(min)}`;
    if (shiftRadius) statsMsg += ` · radius: ${shiftRadius}m on ${radiusTarget} locations`;
    sysMsg(statsMsg);
  }

  // Cache for interactive HTML export
  lastMapData = {
    kind: "shift_map",
    title: s.title || "Shift Map",
    pairs: sample.map(p => ({
      la1: p.la1, lo1: p.lo1, la2: p.la2, lo2: p.lo2,
      oldOk: p.oldOk, newOk: p.newOk, label: p.label,
      dist: (p.oldOk && p.newOk) ? haversine(p.la1,p.lo1,p.la2,p.lo2) : null,
    })),
    radius: shiftRadius,
    radiusTarget: shiftRadius ? radiusTarget : null,
  };
}

// Build rich popup from all row data (or just popup_col).
// IMPORTANT: returns an HTML string consumed by Leaflet's bindPopup, so
// every value/column must be escaped — otherwise a cell containing a raw
// script tag would execute when the popup opens.
function buildPopup(idx, spec) {
  if (spec.popup_col && tableData[spec.popup_col]) {
    return escapeHtml(String(tableData[spec.popup_col][idx] ?? ""));
  }
  const skip = new Set([spec.lat_col, spec.lon_col]);
  const lines = [];
  for (const [col, vals] of Object.entries(tableData)) {
    if (skip.has(col)) continue;
    const v = vals[idx];
    if (v === null || v === undefined || v === "") continue;
    lines.push(`<b>${escapeHtml(col)}:</b> ${escapeHtml(String(v))}`);
    if (lines.length >= 7) break;
  }
  return lines.join("<br/>");
}

// =================================================================
//  DOWNLOAD  — PNG export for charts and maps
// =================================================================
async function downloadViz() {
  const btn = document.getElementById("download-btn");
  const filename = (lastSpec?.title || tableName || "chart")
    .replace(/[^\w\s-]/g, "").replace(/\s+/g, "_") + ".png";

  btn.textContent = "...";
  btn.disabled = true;

  try {
    const pd = document.getElementById("plotly-div");
    const md = document.getElementById("map-div");
    const dg = document.getElementById("dashboard-grid");

    if (dg.style.display === "grid") {
      // Dashboard — full grid screenshot
      const canvas = await html2canvas(dg, { useCORS:true, allowTaint:true, scale:1.5, logging:false });
      const link = document.createElement("a");
      link.download = filename;
      link.href = canvas.toDataURL("image/png");
      link.click();
    } else if (pd.style.display !== "none") {
      await Plotly.downloadImage("plotly-div", {
        format:"png", filename:filename.replace(".png",""),
        width:1400, height:900, scale:2,
      });
    } else if (md.style.display !== "none") {
      const canvas = await html2canvas(md, { useCORS:true, allowTaint:true, scale:2, logging:false });
      const link = document.createElement("a");
      link.download = filename;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  } catch(e) {
    addMsg("error", "Download failed: " + e.message);
  } finally {
    btn.textContent = "⬇ PNG";
    btn.disabled = false;
  }
}

// Helper for HTML escaping in template literals
function escapeHtml(s) {
  return String(s||"").replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

  const choice = prompt("Select template:\n" + names.map((n,i) => (i+1) + ". " + n).join("\n") + "\n\nEnter number:", "1");
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  const name = names[idx] || names[0];
  if (!name) return;
  document.getElementById("user-input").value = DASH_TEMPLATES[name];
  addMsg("sys", "📋 Template: " + name + " — press Send or Enter to generate.");
}

function downloadDashboardHTML() {

    .replace(/[^\w\s-]/g,"").replace(/\s+/g,"_") + ".html";

  // Embed table data needed by panels (only referenced columns)
  const usedCols = new Set();
  lastDashSpec.panels.forEach(p => {

     "lat_col","lon_col","radius_col","lat_old","lon_old","lat_new","lon_new","label_col",
     "col","filter_col"]
      .forEach(k => { if (p[k] && tableData[p[k]]) usedCols.add(p[k]); });

    if (Array.isArray(p.filters)) p.filters.forEach(f => {
      if (f.col && tableData[f.col]) usedCols.add(f.col);

  if (usedCols.size === 0 && tableName) {

  }
  const dataSnap = {};

  const payload = JSON.stringify({
    title: lastDashSpec.title || "Dashboard",
    panels: lastDashSpec.panels,
    data: dataSnap,

  const html = `<!DOCTYPE html>

<style>
